const autoClassify = (post) => {
  const cap = (post.caption || '').toLowerCase();
  const ct = (post.auto_content_type || '').toLowerCase().trim();
  const hardKw = ['% off','off site-wide','sale','discount','flash sale','limited time','48 hrs','24 hrs','ends tonight','ends today','shop now','grab yours','get yours','order now','buy now','hours only','last chance'];
  if (hardKw.some(k => cap.includes(k))) return { intent:'sell', cta:'', confidence:'high', reason:'Promo language' };
  if (ct === 'product') return { intent:'sell', cta:'', confidence:'high', reason:'Product content' };
  if (ct === 'teaching - product') return { intent:'sell', cta:'', confidence:'high', reason:'Product-integrated teaching' };
  if (ct === 'collaborations') return { intent:'sell', cta:'', confidence:'medium', reason:'Collaboration' };
  const prodNames = ['bundle','flashcard','workbook','navigator','pocket guide','study guide','label lab','templates','cheat sheet','notebook','pharmacology flashcards'];
  if (prodNames.some(p => cap.includes(p))) return { intent:'sell', cta:'', confidence:'medium', reason:'Product name in caption' };
  const softKw = ['link in bio','check out','available now','in my shop','link below'];
  if (softKw.some(k => cap.includes(k)) && !['funny','inspirational'].includes(ct)) return { intent:'sell', cta:'', confidence:'medium', reason:'Soft CTA in caption' };
  if (['funny','inspirational'].includes(ct)) return { intent:'grow', cta:'', confidence:'high', reason:'Engagement content' };
  if (['sim lab','quiz','teaching - whiteboard','teaching - poster','demonstration','prerequisites'].includes(ct)) return { intent:'grow', cta:'', confidence:'medium', reason:'Pure educational' };
  return { intent:'grow', cta:'', confidence:'low', reason:'Default' };
};

const parseCSV = (text) => {
  const clean = text.replace(/^\uFEFF/, '').replace(/\r\n/g, '\n').replace(/\r/g, '\n');
  const rows = [];
  var row = []; var field = ''; var inQ = false; var skipNext = false;
  for (var i = 0; i < clean.length; i++) {
    if (skipNext) { skipNext = false; continue; }
    var ch = clean[i];
    if (inQ) {
      if (ch === '"') {
        if (i + 1 < clean.length && clean[i + 1] === '"') {
          field += '"';
          skipNext = true;
        } else {
          inQ = false;
        }
      } else {
        field += ch;
      }
    } else {
      if (ch === '"') { inQ = true; }
      else if (ch === ',') { row.push(field.trim()); field = ''; }
      else if (ch === '\n') { row.push(field.trim()); if (row.some(function(f){return f;})) rows.push(row); row = []; field = ''; }
      else { field += ch; }
    }
  }
  if (field || row.length) { row.push(field.trim()); if (row.some(function(f){return f;})) rows.push(row); }
  if (rows.length < 2) return [];
  var hdr = rows[0];
  return rows.slice(1).map(function(r) {
    var obj = {};
    hdr.forEach(function(h, idx) { obj[h] = r[idx] || ''; });
    return obj;
  });
};

const parseIGDate = (ds) => {
  if (!ds) return '';
  const iso = ds.match(/(\d{4})-(\d{2})-(\d{2})/);
  if (iso) return `${iso[1]}-${iso[2]}-${iso[3]}`;
  const months = {Jan:'01',Feb:'02',Mar:'03',Apr:'04',May:'05',Jun:'06',Jul:'07',Aug:'08',Sep:'09',Oct:'10',Nov:'11',Dec:'12'};
  const later = ds.match(/^(\w{3})\s+(\d{1,2}),?\s+(\d{4})/);
  if (later && months[later[1]]) return `${later[3]}-${months[later[1]]}-${later[2].padStart(2,'0')}`;
  return '';
};

const parseIGCSV = (text) => {
  const clean = text.replace(/^\uFEFF/, '');
  return parseCSV(clean).map((r, i) => {
    const date = parseIGDate(r['Time Posted'] || r['Date'] || r['date'] || '');
    const engStr = (r['Engagement Rate'] || r['engagement_rate'] || '0').replace('%','');
    return {
      id: i+1,
      date,
      caption: r['Caption'] || r['caption'] || '',
      media_type: (r['Media Type (Image, Video, Carousel)'] || r['Media Type'] || 'video').toLowerCase(),
      ig_url: r['Instagram Post'] || r['Post URL'] || r['URL'] || r['Permalink'] || '',
      engagement_rate: parseFloat(engStr) || 0,
      views: parseInt(r['Views'] || r['Impressions'] || r['Reach'] || r['views'] || r['reach'] || 0) || 0,
      likes: parseInt(r['Likes'] || r['likes'] || 0) || 0,
      saves: parseInt(r['Saves'] || r['saves'] || 0) || 0,
      shares: parseInt(r['Shares'] || r['shares'] || 0) || 0,
      comments: parseInt(r['Comments'] || r['comments'] || 0) || 0,
      auto_content_type: '',
    };
  }).filter(p => p.date);
};

const parseShopifyCSV = (text) => {
  const rows = parseCSV(text); const d = {};
  rows.forEach(r => { const day = r['Day']||r['date']||''; if (!day) return; if (!d[day]) d[day]={date:day,orders:0,revenue:0}; d[day].orders += parseInt(r['Quantity ordered']||0)||0; d[day].revenue += parseFloat(r['Total sales']||0)||0; });
  return Object.values(d).sort((a,b) => a.date.localeCompare(b.date)).map(x => ({...x, revenue: Math.round(x.revenue*100)/100, lt_views:0, lt_clicks:0}));
};

const parseLTDate = (ds) => {
  if (!ds) return '';
  if (/^\d{4}-\d{2}-\d{2}$/.test(ds)) return ds;
  var parts = ds.split('/');
  if (parts.length === 3) {
    var m = parts[0].padStart(2,'0');
    var d = parts[1].padStart(2,'0');
    var y = parts[2];
    if (y.length === 2) y = (parseInt(y) >= 50 ? '19' : '20') + y;
    return y + '-' + m + '-' + d;
  }
  return ds;
};

const parseLTCSV = (text) => {
  const rows = parseCSV(text); const d = {};
  rows.forEach(r => {
    const rawDay = r['date'] || r['Date'] || r['Day'] || '';
    const day = parseLTDate(rawDay);
    if (!day) return;
    d[day] = {
      lt_views: parseInt(r['total_views'] || r['Views'] || r['views'] || r['Pageviews'] || r['unique_views'] || 0) || 0,
      lt_clicks: parseInt(r['total_clicks'] || r['Clicks'] || r['clicks'] || r['Link Clicks'] || r['unique_clicks'] || 0) || 0,
    };
  });
  return d;
};

const parseCUDate = (s) => {
  if (!s) return null;
  const clean = s.replace(/^[A-Za-z]+,\s*/, '').replace(/(\d+)(st|nd|rd|th)/g, '$1').trim();
  const months = {January:'01',February:'02',March:'03',April:'04',May:'05',June:'06',July:'07',August:'08',September:'09',October:'10',November:'11',December:'12'};
  const m = clean.match(/^(\w+)\s+(\d+)\s+(\d{4})$/);
  if (!m) return null;
  const mm = months[m[1]]; if (!mm) return null;
  return `${m[3]}-${mm}-${m[2].padStart(2,'0')}`;
};

const parseCUCSV = (text) => {
  const rows = parseCSV(text);
  return rows.map(r => ({
    date: parseCUDate(r['Post Date (date)'] || r['Date'] || ''),

const toPercentile = function(val, bench) {
  if (!bench || !bench.length) return 0;
  var lo = 0, hi = bench.length;
  while (lo < hi) { var mid = (lo + hi) >> 1; if (bench[mid] < val) lo = mid + 1; else hi = mid; }
  var pctRank = (lo / bench.length) * 100;
  if (pctRank <= 50) return Math.round(pctRank * 49 / 50);
  if (pctRank >= 75) return 100;
  return Math.round(50 + (pctRank - 50) * 50 / 25);
};

          if (ct === 'inspirational' && (cap.indexOf('\u2764') !== -1 || cap.indexOf('\u{1F64F}') !== -1 || cap.indexOf('proud') !== -1 || cap.indexOf('future nurse') !== -1 || cap.indexOf('worth it') !== -1)) score += 2;
          if ((ct === 'product' || ct === 'teaching - product') && (cap.indexOf('link') !== -1 || cap.indexOf('shop') !== -1 || cap.indexOf('bundle') !== -1 || cap.indexOf('flashcard') !== -1 || cap.indexOf('workbook') !== -1 || cap.indexOf('navigator') !== -1 || cap.indexOf('label lab') !== -1)) score += 2;
          if (ct === 'sim lab' && (cap.indexOf('sim') !== -1 || cap.indexOf('skills') !== -1 || cap.indexOf('clinical') !== -1 || cap.indexOf('patient') !== -1)) score += 2;
          if ((ct === 'teaching - whiteboard' || ct === 'teaching - poster') && (cap.indexOf('vs') !== -1 || cap.indexOf('difference') !== -1)) score += 2;
          if (ct === 'demonstration' && (cap.indexOf('how to') !== -1 || cap.indexOf('tip') !== -1 || cap.indexOf('technique') !== -1)) score += 2;
          pairs.push({ postIdx: pi, taskIdx: ti, score: score, postId: p.id, task: t });
        }
      }
      pairs.sort(function(a, b) { return b.score - a.score; });
      var usedPosts = {}, usedTasks = {};
      for (var k = 0; k < pairs.length; k++) {
        var pair = pairs[k];
        if (usedPosts[pair.postIdx] || usedTasks[pair.taskIdx]) continue;
        usedPosts[pair.postIdx] = true;
        usedTasks[pair.taskIdx] = true;
        assignments[pair.postId] = {
          contentType: pair.task.contentType || '',
          taskId: pair.task.taskId || '',
          matchConfidence: pair.score > 0 ? 'high' : 'low',
        };
      }
    });
    return assignments;
  }, [classified, clickupMap, overrides]);

  const getCls = (post) => {
    const o = overrides[post.id];
    const a = post.auto || autoClassify(post);
    let ct = o?.content_type || post.auto_content_type || '';
    let matchConfidence = 'exact';
    if (!ct && cuAssignments[post.id]) {
      ct = cuAssignments[post.id].contentType || '';
      matchConfidence = cuAssignments[post.id].matchConfidence || 'low';
    }
    var resolvedCt = ct.toLowerCase().trim();
    var intent = o?.intent || '';
    if (!intent && resolvedCt) {
      var intentMap = {
        'funny':'grow', 'inspirational':'grow', 'collaborations':'grow',
        'demonstration':'grow', 'giveaway':'grow', 'sim lab':'grow',
        'product':'sell', 'teaching - product':'sell',
        'teaching - poster':'sell', 'teaching - whiteboard':'sell',
      };
      intent = intentMap[resolvedCt] || '';
    }
    if (!intent) intent = a.intent || 'grow';
    return { content_type: ct, intent: intent, isOverridden: !!(o?.intent||o?.content_type), matchConfidence: matchConfidence };
  };
  const setOv = (id, f, v) => setOverrides(p => ({...p,[id]:{...p[id],[f]:v, lastEdited: new Date().toISOString()}}));
  const dailyMap = useMemo(() => { const m = {}; daily.forEach(d => m[d.date] = d); return m; }, [daily]);

  const attr = useMemo(() => {
    const nsd = daily.filter(d => !saleDays.includes(d.date));
    const baseRev = nsd.length ? nsd.reduce((s,d) => s+d.revenue,0)/nsd.length : 0;
    const norm = (val, cap) => Math.min(val / cap, 1) * 100;
    const tw = weights.views + weights.saves + weights.shares + weights.likes + weights.eng || 1;
    const w = { views: weights.views/tw, saves: weights.saves/tw, shares: weights.shares/tw, likes: weights.likes/tw, eng: weights.eng/tw };

    const scored = classified.map(p => {
      const cls = getCls(p);
      const score = Math.round(
        norm(p.views, caps.views) * w.views +
        norm(p.saves, caps.saves) * w.saves +
        norm(p.shares, caps.shares) * w.shares +
        norm(p.likes, caps.likes) * w.likes +
        norm(p.engagement_rate, caps.eng) * w.eng
      );

      const d0 = dailyMap[p.date];
      const nd = new Date(p.date + 'T12:00:00Z'); nd.setDate(nd.getDate()+1);
      const d1 = dailyMap[nd.toISOString().slice(0,10)];
      const revW = ((d0?.revenue||0) + (d1?.revenue||0)) / 2;
      const revAB = baseRev > 0 ? ((revW - baseRev) / baseRev) : 0;
      const isSW = saleDays.includes(p.date) || saleDays.includes(nd.toISOString().slice(0,10));
      const ltC = d0?.lt_clicks || 0;
      const lScore = ltC <= 0 ? 0 : ltC <= ltMid ? Math.round(ltC / ltMid * 50) : Math.round(50 + Math.min((ltC - ltMid) / (ltMax - ltMid), 1) * 50);

      let label = 'normal';
      if (score >= 70 && revAB > 0.1 && !isSW) label = 'high-performer';
      else if (score >= 70 && revAB <= 0 && !isSW) label = 'grow-hero';
      else if (score >= 50) label = 'solid';

      return { ...p, cls, score, lScore, revWindow: Math.round(revW), revAboveBaseline: Math.round(revAB*100), label, isSaleWindow: isSW, ltClicks: ltC };
    });
    return { scored, baseRev: Math.round(baseRev) };
  }, [classified, daily, overrides, saleDays, dailyMap, caps, weights, ltMax]);

  const processSheetFile = function(file) {
    var name = (file.name || '').toLowerCase();
    var isXlsx = name.endsWith('.xlsx') || name.endsWith('.xls') || name.endsWith('.xlsm');
    if (isXlsx) {
      var reader = new FileReader();
      reader.onload = function(ev) {
        try {
          var wb = XLSX.read(new Uint8Array(ev.target.result), {type:'array'});
          var sheets = [];
          wb.SheetNames.forEach(function(sn) {
            var ws = wb.Sheets[sn];
            var jsonData = XLSX.utils.sheet_to_json(ws, {header:1, defval:''});
            if (jsonData.length < 1) return;
            var headers = jsonData[0].map(function(h){return String(h);});
            var rows = jsonData.slice(1).map(function(r){return headers.map(function(h,i){return String(r[i]||'');});});
            sheets.push({name:sn, headers:headers, rows:rows});
          });
          if (!sheets.length) { setUploadMsg('\u26a0\ufe0f Empty spreadsheet'); return; }
          setSheetData(sheets);
          setSheetTab(0);
          setSheetName(file.name);
          var totalRows = sheets.reduce(function(s,sh){return s+sh.rows.length;},0);
          setUploadMsg('\u2705 Excel loaded: ' + sheets.length + ' sheet' + (sheets.length>1?'s':'') + ', ' + totalRows + ' total rows');
        } catch(err) { setUploadMsg('\u274c Failed to parse Excel: ' + err.message); }
      };
      reader.readAsArrayBuffer(file);
    } else {
      var reader = new FileReader();
      reader.onload = function(ev) {
        try {
          var rows = parseCSV(ev.target.result);
          if (rows.length) {
            var headers = Object.keys(rows[0]);
            var data = rows.map(function(r){ return headers.map(function(h){return r[h]||'';}); });
            setSheetData([{name:'Sheet 1', headers:headers, rows:data}]);
            setSheetTab(0);
            setSheetName(file.name);
            setUploadMsg('\u2705 Spreadsheet loaded: ' + rows.length + ' rows, ' + headers.length + ' columns');
          } else setUploadMsg('\u26a0\ufe0f No data found');
        } catch(err) { setUploadMsg('\u274c ' + err.message); }
      };
      reader.readAsText(file);
    }
  };

  const processUpload = (type, text) => {
    try {
        if (type === 'ig') {
          const newPosts = parseIGCSV(text);
          if (newPosts.length) {
            setPosts(prev => {
              const existing = new Set(prev.map(p => p.date + '|' + (p.caption||'').slice(0,30)));
              const toAdd = newPosts.filter(p => !existing.has(p.date + '|' + (p.caption||'').slice(0,30)));
              const maxId = prev.reduce((m, p) => Math.max(m, p.id || 0), 0);
              const added = toAdd.map((p, i) => ({ ...p, id: maxId + i + 1 }));
              setUploadMsg(`\u2705 ${newPosts.length} parsed \u2014 ${added.length} new, ${newPosts.length - added.length} already existed`);
              return [...prev, ...added];
            });
          } else setUploadMsg('\u26a0\ufe0f No posts found in CSV');
        }
        else if (type === 'shopify') {
          const newDaily = parseShopifyCSV(text);
          if (newDaily.length) {
            setDaily(prev => {
              const existingDates = new Set(prev.map(d => d.date));
              const toAdd = newDaily.filter(d => !existingDates.has(d.date)).map(d => ({ ...d, lt_views: 0, lt_clicks: 0 }));
              setUploadMsg(`\u2705 ${newDaily.length} days parsed \u2014 ${toAdd.length} new, ${newDaily.length - toAdd.length} already existed`);
              if (toAdd.length === 0) return prev;
              return [...prev, ...toAdd].sort((a, b) => a.date.localeCompare(b.date));
            });
          } else setUploadMsg('\u26a0\ufe0f No Shopify data found');
        }
        else if (type === 'lt') {
          const lt = parseLTCSV(text);
          const n = Object.keys(lt).length;
          if (n) {
            setDaily(prev => {
              const existingLT = new Set(prev.filter(d => d.lt_clicks > 0).map(d => d.date));
              const map = {};
              prev.forEach(d => { map[d.date] = { ...d }; });
              let added = 0;
              Object.entries(lt).forEach(function(entry) {
                var date = entry[0], vals = entry[1];
                if (existingLT.has(date)) return;
                if (map[date]) { map[date].lt_views = vals.lt_views; map[date].lt_clicks = vals.lt_clicks; added++; }
                else { map[date] = { date: date, orders: 0, revenue: 0, lt_views: vals.lt_views, lt_clicks: vals.lt_clicks }; added++; }
              });
              setUploadMsg('\u2705 ' + n + ' days parsed \u2014 ' + added + ' new, ' + (n - added) + ' already had LT data');
              return Object.values(map).sort(function(a, b) { return a.date.localeCompare(b.date); });
            });
          } else setUploadMsg('\u26a0\ufe0f No Linktree data found');
        }
        else if (type === 'cu') {
          const cuRows = parseCUCSV(text);
          if (cuRows.length) {
            const map = {...clickupMap};
            cuRows.forEach(r => {
              if (!map[r.date]) map[r.date] = [];
              if (!map[r.date].some(t => t.taskId === r.taskId)) {
                map[r.date].push({ taskId: r.taskId, taskName: r.taskName, contentType: r.contentType });
              }
            });
            setClickupMap(map);
            setPosts(prev => prev.map(p => {
              const cuTasks = map[p.date];
              if (!cuTasks || cuTasks.length === 0 || p.auto_content_type) return p;
              const match = cuTasks.find(t => t.contentType);
              return match ? { ...p, auto_content_type: match.contentType } : p;
            }));
            setUploadMsg(`\u2705 ${cuRows.length} ClickUp tasks loaded (${Object.keys(map).length} days)`);
          } else setUploadMsg('\u26a0\ufe0f No ClickUp data found');
        }
        else if (type === 'corrections') {
          var rows = parseCSV(text);
          if (!rows.length) { setUploadMsg('\u26a0\ufe0f Empty file'); return; }
          var firstRow = rows[0];
          var hasDate = 'date' in firstRow;
          var hasType = 'type' in firstRow;
          var hasIntent = 'intent' in firstRow;
          var hasUrl = 'ig_url' in firstRow;
          if (!hasDate || !hasType || !hasIntent || !hasUrl) {
            setUploadMsg('\u274c Invalid file. Must have headers: date, type, intent, ig_url (caption optional). Use the exported CSV as your template.');
            return;
          }
          var urlToId = {};
          posts.forEach(function(p) { if (p.ig_url) urlToId[p.ig_url.trim()] = p.id; });
          var matched = 0, notFound = 0;
          var newOverrides = {...overrides};
          rows.forEach(function(r) {
            var url = (r['ig_url'] || '').trim();
            var ct = (r['type'] || '').trim();
            var intent = (r['intent'] || '').trim().toLowerCase();
            if (!url) return;
            var pid = urlToId[url];
            if (!pid) { notFound++; return; }
            var ov = {...(newOverrides[pid] || {})};
            if (ct) ov.content_type = ct;
            if (intent === 'sell' || intent === 'grow') ov.intent = intent;
            ov.reviewed = true;
            ov.lastEdited = new Date().toISOString();
            newOverrides[pid] = ov;
            matched++;
          });
          setOverrides(newOverrides);
          setUploadMsg('\u2705 ' + rows.length + ' rows \u2014 ' + matched + ' matched, ' + notFound + ' not found');
        }
      } catch(err) { setUploadMsg('\u274c ' + err.message); }
  };

  const calData = useMemo(() => {
    const [y,m] = calMonth.split('-').map(Number);
    const fd = new Date(y,m-1,1).getDay();
    const dim = new Date(y,m,0).getDate();
    const isReels = calMediaFilter === 'reels';
    const isBoth = calMediaFilter === 'both';
    
    var buildCell = function(dateStr, day, isOtherMonth) {
      var dayPosts = attr.scored.filter(function(p) {
        if (p.date !== dateStr) return false;
        if (isBoth) return true;
        var mt = (p.media_type || '').toLowerCase();
        return isReels ? (mt === 'video' || mt === 'reel') : (mt === 'image' || mt === 'carousel' || mt === 'photo');
      });
      return { day: day, date: dateStr, posts: dayPosts, metrics: dailyMap[dateStr], isSale: saleDays.includes(dateStr), isOtherMonth: !!isOtherMonth };
    };
    
    const weeks = []; let wk = [];
    if (fd > 0) {
      var prevDim = new Date(y, m-1, 0).getDate();
      var prevM = m - 1; var prevY = y;
      if (prevM < 1) { prevM = 12; prevY--; }
      for (var i = fd - 1; i >= 0; i--) {
        var pd = prevDim - i;
        var pds = prevY + '-' + String(prevM).padStart(2,'0') + '-' + String(pd).padStart(2,'0');
        wk.push(buildCell(pds, pd, true));
      }
    }
    for (let d=1; d<=dim; d++) {
      const ds = y + '-' + String(m).padStart(2,'0') + '-' + String(d).padStart(2,'0');
      wk.push(buildCell(ds, d, false));
      if (wk.length===7) { weeks.push(wk); wk=[]; }
    }
    if (wk.length > 0) {
      var nextM = m + 1; var nextY = y;
      if (nextM > 12) { nextM = 1; nextY++; }
      var nd = 1;
      while (wk.length < 7) {
        var nds = nextY + '-' + String(nextM).padStart(2,'0') + '-' + String(nd).padStart(2,'0');
        wk.push(buildCell(nds, nd, true));
        nd++;
      }
      weeks.push(wk);
    }
    return weeks;
  }, [calMonth, calMediaFilter, attr, dailyMap, saleDays]);

  const insights = useMemo(() => {
    const byType = {};
    attr.scored.forEach(p => {
      const ct = p.cls.content_type || 'Unknown';
      if (!byType[ct]) byType[ct] = { posts:0, views:0, eng:0, saves:0, eScores:[], lScores:[], ltDays:{} };
      byType[ct].posts++; byType[ct].views += p.views; byType[ct].eng += p.engagement_rate; byType[ct].saves += p.saves;
      byType[ct].eScores.push(p.score);
      byType[ct].lScores.push(p.lScore);
      if (!byType[ct].ltDays[p.date]) byType[ct].ltDays[p.date] = true;
    });
    const typeStats = Object.entries(byType).map(([type,v]) => {
      const days = Object.keys(v.ltDays);
      const ltSum = days.reduce((s,d) => s+(dailyMap[d]?.lt_clicks||0),0);
      const ltDaysN = days.filter(d => dailyMap[d]?.lt_clicks>0).length;
      const avgE = v.eScores.length ? Math.round(v.eScores.reduce((a,b)=>a+b,0)/v.eScores.length) : 0;
      const avgL = v.lScores.length ? Math.round(v.lScores.reduce((a,b)=>a+b,0)/v.lScores.length) : 0;
      return { type, posts:v.posts, avgViews:Math.round(v.views/v.posts), avgEng:+(v.eng/v.posts).toFixed(1), avgLtClicks: ltDaysN>0?Math.round(ltSum/ltDaysN):0, avgSaves:Math.round(v.saves/v.posts), avgE, avgL };
    }).sort((a,b) => b.avgE-a.avgE);

    const typeRev = {};
    daily.filter(d => !saleDays.includes(d.date)).forEach(d => {
      const types = new Set(classified.filter(p=>p.date===d.date).map(p=>getCls(p).content_type));
      types.forEach(ct => { if(!typeRev[ct]) typeRev[ct]={revs:[],days:0}; typeRev[ct].revs.push(d.revenue); typeRev[ct].days++; });
    });
    const typeRevStats = Object.entries(typeRev).filter(([_,v])=>v.days>=2).map(([type,v])=>({ type, avgRevenue:Math.round(v.revs.reduce((a,b)=>a+b,0)/v.days), days:v.days })).sort((a,b)=>b.avgRevenue-a.avgRevenue);
    const nsd = daily.filter(d=>!saleDays.includes(d.date));
    const baseRev = nsd.length ? Math.round(nsd.reduce((s,d)=>s+d.revenue,0)/nsd.length) : 0;
    return { typeStats, typeRevStats, baseRev };
  }, [classified, daily, overrides, saleDays, dailyMap]);

  const fmtR = v => `$${(v/1000).toFixed(1)}K`;
  const scoreColor = (s) => percentileMode ? (s >= 100 ? '#86efac' : s >= 50 ? C.green : C.red) : (s >= 70 ? C.green : s >= 50 ? C.amber : s >= 20 ? '#6b7280' : C.red);
  const scoreBg = (s) => percentileMode ? (s >= 100 ? '#86efac40' : s >= 50 ? C.green+'25' : C.red+'15') : (s >= 70 ? C.green+'25' : s >= 50 ? C.amber+'20' : s >= 20 ? '#6b728015' : C.red+'15');
  const ltHeatColor = (lt) => lt >= 550 ? C.amber : lt >= 450 ? C.amber+'cc' : lt >= 350 ? C.amber+'80' : lt > 0 ? C.amber+'50' : C.muted;
  const ltHeatBg = (lt) => lt >= 550 ? C.amber+'25' : lt >= 450 ? C.amber+'18' : lt >= 350 ? C.amber+'10' : 'transparent';
  const Pill = ({label,active,color,onClick,small}) => <button onClick={onClick} style={{padding:small?'3px 10px':'5px 14px',borderRadius:'6px',border:`1px solid ${active?color:C.border}`,background:active?`${color}18`:'transparent',color:active?color:C.dim,fontSize:small?'12px':'13px',fontWeight:active?600:400,cursor:'pointer',whiteSpace:'nowrap'}}>{label}</button>;
  const eDisplay = function(p) { return percentileMode ? toPercentile(p.score, BENCH_E) : p.score; };
  const lDisplay = function(p) { return p.lScore; };
  const lScoreColor = (s) => s >= 50 ? C.green : C.red;
  const lScoreBg = (s) => s >= 50 ? C.green+'25' : C.red+'15';
  const Badge = ({p}) => { var s = eDisplay(p); return <span style={{padding:'2px 7px',borderRadius:'4px',fontSize:'11px',fontWeight:700,background:scoreBg(s),color:scoreColor(s)}}>{s}</span>; };
  const LBadge = ({p}) => { var s = p.lScore; return <span style={{padding:'2px 7px',borderRadius:'4px',fontSize:'11px',fontWeight:700,background:lScoreBg(s),color:lScoreColor(s)}}>{s}</span>; };
  const safeEncode = (s) => { try { return encodeURIComponent(s.replace(/[^\x20-\x7E]/g, '').trim()); } catch(e) { return ''; } };
  const getCUUrl = (post) => {
    if (cuAssignments[post.id]?.taskId) return 'https://app.clickup.com/t/' + cuAssignments[post.id].taskId;
    var ovType = (overrides[post.id]?.content_type || '').toLowerCase().trim();
    if (ovType && clickupMap[post.date]) {
      var matchByType = clickupMap[post.date].find(function(t) { return (t.contentType || '').toLowerCase().trim() === ovType; });
      if (matchByType) return 'https://app.clickup.com/t/' + matchByType.taskId;
    }
    var tasks = clickupMap[post.date];
    if (tasks && tasks.length === 1) return 'https://app.clickup.com/t/' + tasks[0].taskId;
    return 'https://app.clickup.com/9017029478/search?q=' + safeEncode(post.caption.slice(0,30));
  };

  return (
    <div style={{minHeight:'100vh',background:C.bg,color:C.text,fontFamily:"'DM Sans',-apple-system,sans-serif",padding:'20px 28px'}}>
      <div style={{maxWidth:'1600px',margin:'0 auto'}}>

        {/* HEADER */}
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:'12px',marginBottom:'20px'}}>
          <div>
            <h1 style={{fontSize:'26px',fontWeight:700,margin:0}}>NITM Content Tracker</h1>
            <p style={{fontSize:'14px',color:C.dim,margin:'4px 0 0'}}>{posts.length} posts · {daily.length} days</p>
          </div>
          <div style={{display:'flex',gap:'8px',alignItems:'center'}}>
            {!revUnlocked ? (
              showPinInput ? (
                <div style={{display:'flex',gap:'4px',alignItems:'center'}}>
                  <input type="password" placeholder="PIN" value={pinInput} autoFocus onChange={e=>setPinInput(e.target.value)} onKeyDown={e=>{if(e.key==='Enter'){if(pinInput===REV_PIN){setRevUnlocked(true);setShowCaps(true);setPinInput('');setShowPinInput(false);}else{setPinInput('');}}}} style={{width:'70px',padding:'6px 8px',borderRadius:'6px',border:`1px solid ${C.border}`,background:C.bg,color:C.text,fontSize:'12px'}} />
                  <button onClick={()=>{if(pinInput===REV_PIN){setRevUnlocked(true);setShowCaps(true);setPinInput('');setShowPinInput(false);}else{setPinInput('');}}} style={{padding:'6px 10px',borderRadius:'6px',border:`1px solid ${C.accent}`,background:'transparent',color:C.accent,fontSize:'11px',cursor:'pointer'}}>Go</button>
                  <button onClick={()=>{setShowPinInput(false);setPinInput('');}} style={{padding:'6px 8px',borderRadius:'6px',border:'none',background:'transparent',color:C.muted,fontSize:'11px',cursor:'pointer'}}>Cancel</button>
                </div>
              ) : (
                <button onClick={()=>setShowPinInput(true)} style={{padding:'8px 14px',borderRadius:'8px',border:`1px solid ${C.border}`,background:'transparent',color:C.dim,fontSize:'13px',cursor:'pointer'}}>Settings</button>
              )
            ) : (
              <React.Fragment>
                <button onClick={()=>setShowCaps(!showCaps)} style={{padding:'8px 14px',borderRadius:'8px',border:`1px solid ${C.border}`,background:showCaps?C.amber+'20':'transparent',color:showCaps?C.amber:C.dim,fontSize:'13px',cursor:'pointer'}}>Settings</button>
                <button onClick={()=>{setRevUnlocked(false);setShowCaps(false);}} style={{padding:'6px 10px',borderRadius:'6px',border:`1px solid ${C.red}40`,background:'transparent',color:C.red,fontSize:'11px',cursor:'pointer'}}>Lock</button>
              </React.Fragment>
            )}
            <button onClick={()=>setShowUpload(!showUpload)} style={{padding:'8px 14px',borderRadius:'8px',border:`1px solid ${C.border}`,background:showUpload?C.accent+'20':'transparent',color:showUpload?C.accent:C.dim,fontSize:'13px',cursor:'pointer'}}>{'\u{1F4E4}'} Upload Data</button>
          </div>
        </div>

        {showCaps && (
          <div style={{background:C.card,borderRadius:'12px',border:`1px solid ${C.border}`,padding:'20px',marginBottom:'16px'}}>
            <h3 style={{fontSize:'14px',fontWeight:600,margin:'0 0 4px'}}>Settings</h3>
            <p style={{fontSize:'12px',color:C.dim,margin:'0 0 16px'}}>Load a preset or adjust weights and caps manually. Weights auto-normalize to 100%.</p>

            <div style={{marginBottom:'20px',padding:'12px',borderRadius:'8px',border:'1px solid '+(percentileMode?C.green+'60':C.border),background:percentileMode?C.green+'08':'transparent'}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <div>
                  <div style={{fontSize:'12px',fontWeight:600,color:C.text}}>Percentile Mode (2025 Benchmark)</div>

                var dm = dailyMap[dateStr];

                      {lt > 0 && (() => {
                        const ls = lt<=0?0:lt<=ltMid?Math.round(lt/ltMid*50):Math.round(50+Math.min((lt-ltMid)/(ltMax-ltMid),1)*50);

                        <div style={{display:'flex',alignItems:'center',gap:'4px',marginBottom:'5px'}}>

                            <a href={p.ig_url} target="_blank" rel="noopener noreferrer" onClick={e=>e.stopPropagation()} style={{padding:'1px 4px',borderRadius:'3px',fontSize:'8px',fontWeight:700,background:'#e1306c18',color:'#e1306c',textDecoration:'none',lineHeight:'14px',flexShrink:0}}>IG</a>
                          </div>
                        </div>
                        );
                      })}
                    </div>
                  );
                })}
                {/* Weekly summary cell */}
                {(() => {
                  var today = new Date().toISOString().slice(0,10);
                  var lastDateInWeek = '';
                  wk.forEach(function(cell){ if(cell && cell.date) lastDateInWeek = cell.date > lastDateInWeek ? cell.date : lastDateInWeek; });
                  var weekComplete = lastDateInWeek <= today;
                  var hasAnyData = weekPosts.length > 0;
                  var isGrey = !weekComplete && !hasAnyData;
                  var eColor = isGrey ? C.muted : wkDaysGoalMet ? C.green : C.red;
                  var lColor = isGrey ? C.muted : wkLGoalMet ? C.green : C.red;
                  var eBg = isGrey ? 'transparent' : wkDaysGoalMet ? C.green+'12' : C.red+'12';
                  var lBg = isGrey ? 'transparent' : wkLGoalMet ? C.green+'12' : C.red+'12';
                  return (
                <div style={{background:C.bg,borderRadius:'8px',minHeight:'140px',border:'2px solid '+C.border,display:'grid',gridTemplateColumns:'1fr 1fr',gap:'0',overflow:'hidden'}}>
                  <div style={{background:eBg,padding:'14px 8px',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',borderRight:'1px solid '+C.border}}>

                    <div style={{fontSize:'11px',color:C.muted,marginTop:'6px'}}>/7 days</div>

                  <div style={{background:lBg,padding:'14px 8px',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center'}}>

                    <div style={{fontSize:'11px',color:C.muted,marginTop:'6px'}}>/7 days</div>
                  </div>
                </div>

              </div>

              </div>

            <div style={{display:'flex',gap:'6px',marginBottom:'16px',flexWrap:'wrap'}}>

              <span style={{width:'24px',textAlign:'center'}}>{'\u2713'}</span>

            <div style={{display:'flex',flexDirection:'column',gap:'4px'}}>
              {attr.scored.filter(function(p){
                var mt=(p.media_type||'').toLowerCase();
                if(calMediaFilter==='reels'&&mt!=='video'&&mt!=='reel')return false;
                if(calMediaFilter==='posts'&&mt!=='carousel'&&mt!=='image')return false;
                if(recentlyConfirmed[p.id]) return true;
                if(filter==='sell')return p.cls.intent==='sell';
                if(filter==='grow')return p.cls.intent==='grow';
                if(filter==='notype')return !p.cls.content_type;
                if(filter==='unreviewed')return !overrides[p.id]?.reviewed;
                if(filter==='uncertain')return p.cls.matchConfidence==='low';
                if(filter==='needsintent'){var ct=(p.cls.content_type||'').toLowerCase().trim();return (ct==='quiz'||ct==='prerequisites'||ct==='b-roll'||ct==='b roll')&&!overrides[p.id]?.intent;}

                      <span style={{width:'40px',flexShrink:0,textAlign:'right'}}><Badge p={post} /></span>
                      <span style={{width:'55px',padding:'3px 8px',borderRadius:'4px',fontSize:'11px',background:intentC[cls.intent]+'18',color:intentC[cls.intent],textAlign:'center',flexShrink:0}}>{cls.intent}</span>
                      <span onClick={function(e){
                        e.stopPropagation();

              <p style={{fontSize:'13px',color:C.dim,lineHeight:1.6,margin:'0 0 16px'}}>
                Every reel gets an <strong style={{color:C.text}}>E-Score from 0 to 100</strong> based on 5 engagement metrics. Each metric is measured against a cap (the maximum expected value), then weighted by importance.
              </p>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'12px',marginBottom:'20px'}}>
                {[{label:'Views',weight:weights.views,cap:caps.views,icon:'\u{1F441}',desc:'How many people saw it'},{label:'Saves',weight:weights.saves,cap:caps.saves,icon:'\u{1F516}',desc:'People saving for later'},{label:'Shares',weight:weights.shares,cap:caps.shares,icon:'\u{1F4E4}',desc:'DM shares and reposts'},{label:'Likes',weight:weights.likes,cap:caps.likes,icon:'\u2764\ufe0f',desc:'Simple engagement'},{label:'Eng Rate',weight:weights.eng,cap:caps.eng+'%',icon:'\u{1F4CA}',desc:'Engagements \u00f7 views'}].map(function(m){
                  var pct = Math.round(m.weight / (weights.views+weights.saves+weights.shares+weights.likes+weights.eng) * 100);
                  return (
                  <div key={m.label} style={{background:C.bg,borderRadius:'8px',padding:'12px',border:'1px solid '+C.border}}>
                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'6px'}}>

                    <div style={{height:'6px',background:'rgba(255,255,255,0.06)',borderRadius:'3px',overflow:'hidden',marginBottom:'6px'}}>

                    <div style={{fontSize:'10px',color:C.muted,marginTop:'2px'}}>Cap: {typeof m.cap==='number'?m.cap.toLocaleString():m.cap}</div>

              <div style={{background:C.bg,borderRadius:'8px',padding:'16px',border:'1px solid '+C.border}}>

                  E-Score = (Views {'\u00f7'} {caps.views.toLocaleString()} {'\u00d7'} {weights.views}) + (Saves {'\u00f7'} {caps.saves.toLocaleString()} {'\u00d7'} {weights.saves}) + (Shares {'\u00f7'} {caps.shares.toLocaleString()} {'\u00d7'} {weights.shares}) + (Likes {'\u00f7'} {caps.likes.toLocaleString()} {'\u00d7'} {weights.likes}) + (Eng% {'\u00f7'} {caps.eng}% {'\u00d7'} {weights.eng})
                </div>
                <div style={{fontSize:'11px',color:C.muted,marginTop:'8px'}}>Each metric is capped at 100% (reaching the cap = max contribution). Weights are normalized to sum to 100.</div>
              </div>
            </div>

            <div style={{background:C.card,borderRadius:'12px',border:'1px solid '+C.border,padding:'24px'}}>
              <h2 style={{fontSize:'18px',fontWeight:700,margin:'0 0 16px',color:C.text}}>Example: E-Score = 50</h2>
              <p style={{fontSize:'13px',color:C.dim,lineHeight:1.6,margin:'0 0 12px'}}>

              </p>
              {(() => {
                var ex = {views:250000,saves:2500,shares:1500,likes:5000,eng:3.5};
                var tw = weights.views+weights.saves+weights.shares+weights.likes+weights.eng;
                var parts = [{label:'Views',val:ex.views,cap:caps.views,w:weights.views},{label:'Saves',val:ex.saves,cap:caps.saves,w:weights.saves},{label:'Shares',val:ex.shares,cap:caps.shares,w:weights.shares},{label:'Likes',val:ex.likes,cap:caps.likes,w:weights.likes},{label:'Eng%',val:ex.eng,cap:caps.eng,w:weights.eng}];

                return (

                    return (

                      <span style={{width:'30px',color:C.muted,flexShrink:0}}>{'\u00f7'} {typeof p.cap==='number'&&p.cap>=1000?p.cap.toLocaleString():p.cap}{p.label==='Eng%'?'%':''}</span>
                      <span style={{width:'40px',color:C.muted,flexShrink:0}}>= {Math.round(norm*100)}%</span>
                      <span style={{width:'30px',color:C.muted,flexShrink:0}}>{'\u00d7'} {p.w}</span>
                      <div style={{flex:1,height:'8px',background:'rgba(255,255,255,0.06)',borderRadius:'4px',overflow:'hidden'}}>
                        <div style={{height:'100%',width:Math.round(norm*100)+'%',background:C.accent,borderRadius:'4px'}} />
                      </div>
                      <span style={{width:'30px',color:C.accent,fontWeight:700,textAlign:'right',flexShrink:0}}>+{contrib}</span>
                    </div>
                    );
                  })}
                  <div style={{display:'flex',alignItems:'center',gap:'10px',fontSize:'14px',fontWeight:700,paddingTop:'8px',borderTop:'1px solid '+C.border,marginTop:'4px'}}>
                    <span style={{color:C.text}}>Total E-Score</span>
                    <span style={{marginLeft:'auto',padding:'4px 12px',borderRadius:'6px',background:scoreBg(total),color:scoreColor(total),fontSize:'18px'}}>{total}</span>
                  </div>
                </div>
                );
              })()}
            </div>

            <div style={{background:C.card,borderRadius:'12px',border:'1px solid '+(percentileMode?C.green+'60':C.border),padding:'24px'}}>
              <h2 style={{fontSize:'18px',fontWeight:700,margin:'0 0 16px',color:C.text}}>Percentile Mode {percentileMode && <span style={{fontSize:'12px',color:C.green,fontWeight:600}}>(ON)</span>}</h2>
              <p style={{fontSize:'13px',color:C.dim,lineHeight:1.6,margin:'0 0 16px'}}>
                When Percentile Mode is on, scores are measured against <strong style={{color:C.text}}>295 reels from 2025</strong> instead of the raw formula. This tells you how a reel compares to your historical performance.
              </p>
              <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:'12px',marginBottom:'20px'}}>
                <div style={{background:C.red+'15',borderRadius:'8px',padding:'16px',textAlign:'center',border:'1px solid '+C.red+'30'}}>
                  <div style={{fontSize:'28px',fontWeight:800,color:C.red}}>0{'\u2013'}49</div>
                  <div style={{fontSize:'12px',color:C.red,marginTop:'4px',fontWeight:600}}>Below Median</div>
                  <div style={{fontSize:'11px',color:C.dim,marginTop:'4px'}}>Bottom half of 2025 reels</div>
                </div>
                <div style={{background:C.green+'15',borderRadius:'8px',padding:'16px',textAlign:'center',border:'1px solid '+C.green+'30'}}>
                  <div style={{fontSize:'28px',fontWeight:800,color:C.green}}>50{'\u2013'}99</div>
                  <div style={{fontSize:'12px',color:C.green,marginTop:'4px',fontWeight:600}}>Above Median</div>
                  <div style={{fontSize:'11px',color:C.dim,marginTop:'4px'}}>Better than most 2025 reels</div>
                </div>
                <div style={{background:'#86efac20',borderRadius:'8px',padding:'16px',textAlign:'center',border:'1px solid #86efac40'}}>
                  <div style={{fontSize:'28px',fontWeight:800,color:'#86efac'}}>100</div>
                  <div style={{fontSize:'12px',color:'#86efac',marginTop:'4px',fontWeight:600}}>Top 25%</div>
                  <div style={{fontSize:'11px',color:C.dim,marginTop:'4px'}}>Best of 2025</div>
                </div>
              </div>

              <div style={{background:C.bg,borderRadius:'8px',padding:'16px',border:'1px solid '+C.border}}>
                <div style={{fontSize:'12px',fontWeight:600,color:C.text,marginBottom:'12px'}}>2025 E-Score Distribution (295 reels)</div>
                {(() => {
                  var buckets = [];
                  for (var b = 0; b < 10; b++) {
                    var lo = b * 10; var hi = lo + 9;
                    var count = BENCH_E.filter(function(s){ return s >= lo && s <= hi; }).length;
                    buckets.push({range:lo+'-'+hi, count:count});
                  }
                  var maxCount = Math.max.apply(null, buckets.map(function(b){return b.count;}));
                  var p50Bucket = 3;
                  var p75Bucket = 6;
                  return (
                  <div style={{display:'flex',alignItems:'flex-end',gap:'4px',height:'120px'}}>
                    {buckets.map(function(bk, bi){
                      var h = maxCount > 0 ? Math.round(bk.count / maxCount * 100) : 0;
                      var isMedian = bi === p50Bucket;
                      var isP75 = bi === p75Bucket;
                      var barColor = bi < 5 ? C.red+'80' : bi < 8 ? C.green+'80' : '#86efac80';
                      return (
                      <div key={bi} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:'2px'}}>
                        <span style={{fontSize:'9px',color:C.dim}}>{bk.count}</span>
                        <div style={{width:'100%',height:h+'%',minHeight:'2px',background:barColor,borderRadius:'3px 3px 0 0',position:'relative'}}>
                          {isMedian && <div style={{position:'absolute',top:'-18px',left:'50%',transform:'translateX(-50)',fontSize:'8px',color:C.amber,fontWeight:700,whiteSpace:'nowrap'}}>MEDIAN</div>}
                          {isP75 && <div style={{position:'absolute',top:'-18px',left:'50%',transform:'translateX(-50)',fontSize:'8px',color:'#86efac',fontWeight:700,whiteSpace:'nowrap'}}>TOP 25%</div>}
                        </div>
                        <span style={{fontSize:'9px',color:C.muted}}>{bk.range}</span>
                      </div>
                      );
                    })}
                  </div>
                  );
                })()}
                <div style={{fontSize:'10px',color:C.muted,marginTop:'8px',textAlign:'center'}}>Raw E-Score ranges {'\u2192'} number of 2025 reels in each range</div>
              </div>

              <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:'12px',marginTop:'16px'}}>
                {[{label:'Median',val:'34',desc:'50th percentile'},{label:'Top 25%',val:'62+',desc:'75th percentile'},{label:'Top 10%',val:'89+',desc:'90th percentile'},{label:'Mean',val:'42',desc:'Average of all'}].map(function(s){return (
                  <div key={s.label} style={{background:C.bg,borderRadius:'8px',padding:'12px',textAlign:'center',border:'1px solid '+C.border}}>
                    <div style={{fontSize:'20px',fontWeight:800,color:C.text}}>{s.val}</div>
                    <div style={{fontSize:'11px',color:C.accent,fontWeight:600,marginTop:'2px'}}>{s.label}</div>
                    <div style={{fontSize:'10px',color:C.muted,marginTop:'2px'}}>{s.desc}</div>
                  </div>
                );})}
              </div>
            </div>

            <div style={{background:C.card,borderRadius:'12px',border:'1px solid '+C.border,padding:'24px'}}>
              <h2 style={{fontSize:'18px',fontWeight:700,margin:'0 0 16px',color:C.text}}>L-Score (Linktree Clicks)</h2>
              <p style={{fontSize:'13px',color:C.dim,lineHeight:1.6,margin:'0 0 12px'}}>
                The L-Score measures Linktree clicks on the day a post goes live. In standard mode, it is a simple ratio: <strong style={{color:C.text}}>clicks {'\u00f7'} {ltMax.toLocaleString()} {'\u00d7'} 100</strong>.
              </p>
              <p style={{fontSize:'13px',color:C.dim,lineHeight:1.6,margin:'0 0 16px'}}>
                In percentile mode, clicks are compared against 2025 data. The 2025 median was <strong style={{color:C.text}}>1,150 clicks</strong> per day (score 50), and top 25% was <strong style={{color:C.text}}>1,450+ clicks</strong> (score 100).
              </p>
            </div>
          </div>
        )}

        {/* SPREADSHEET */}
        {view === 'sheet' && (
          <div style={{display:'flex',flexDirection:'column',gap:'16px'}}>
            {!sheetData ? (
              <div
                onDragOver={function(e){e.preventDefault();e.stopPropagation();e.currentTarget.style.borderColor=C.accent;e.currentTarget.style.background=C.accent+'10';}}
                onDragLeave={function(e){e.preventDefault();e.currentTarget.style.borderColor=C.border;e.currentTarget.style.background='transparent';}}
                onDrop={function(e){
                  e.preventDefault();e.stopPropagation();
                  e.currentTarget.style.borderColor=C.border;e.currentTarget.style.background='transparent';
                  var file=e.dataTransfer.files[0]; if(!file)return;
                  processSheetFile(file);
                }}
                style={{background:C.card,borderRadius:'12px',border:'2px dashed '+C.border,padding:'60px 40px',textAlign:'center',cursor:'default',transition:'all 0.2s'}}
              >
                <div style={{fontSize:'16px',color:C.text,fontWeight:600,marginBottom:'8px'}}>Drop CSV or Excel file here</div>
                <p style={{fontSize:'12px',color:C.muted}}>Supports .csv, .xlsx, and .xls. Displays as a read-only table.</p>
              </div>
            ) : (
              <div style={{background:C.card,borderRadius:'12px',border:'1px solid '+C.border,padding:'16px',overflow:'auto'}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'8px'}}>
                  <div>
                    <h2 style={{fontSize:'16px',fontWeight:600,margin:0}}>Spreadsheet</h2>
                    <p style={{fontSize:'11px',color:C.muted,margin:'4px 0 0'}}>{sheetName} {'\u00b7'} {sheetData.length} sheet{sheetData.length>1?'s':''}</p>
                  </div>
                  <div style={{display:'flex',gap:'8px'}}>
                    <div
                      onDragOver={function(e){e.preventDefault();e.stopPropagation();e.currentTarget.style.borderColor=C.accent;e.currentTarget.style.background=C.accent+'10';}}
                      onDragLeave={function(e){e.preventDefault();e.currentTarget.style.borderColor=C.border;e.currentTarget.style.background='transparent';}}
                      onDrop={function(e){
                        e.preventDefault();e.stopPropagation();
                        e.currentTarget.style.borderColor=C.border;e.currentTarget.style.background='transparent';
                        var file=e.dataTransfer.files[0]; if(!file)return;
                        processSheetFile(file);
                      }}
                      style={{padding:'6px 12px',borderRadius:'6px',border:'1px dashed '+C.border,background:'transparent',color:C.dim,fontSize:'11px',cursor:'default',transition:'all 0.2s'}}
                    >Drop file to replace</div>
                    <button onClick={function(){setSheetData(null);setSheetName('');setSheetTab(0);}} style={{padding:'6px 12px',borderRadius:'6px',border:'1px solid '+C.red+'40',background:'transparent',color:C.red,fontSize:'11px',cursor:'pointer'}}>Remove</button>
                  </div>
                </div>
                {sheetData.length > 1 && (
                  <div style={{display:'flex',gap:'2px',marginBottom:'12px',background:C.bg,borderRadius:'8px',padding:'2px',border:'1px solid '+C.border,overflowX:'auto'}}>
                    {sheetData.map(function(sh,si){return (
                      <button key={si} onClick={function(){setSheetTab(si);}} style={{padding:'6px 14px',borderRadius:'6px',border:'none',fontSize:'12px',fontWeight:sheetTab===si?600:400,cursor:'pointer',background:sheetTab===si?C.accent:'transparent',color:sheetTab===si?'#fff':C.dim,whiteSpace:'nowrap'}}>{sh.name} <span style={{fontSize:'10px',opacity:0.7}}>({sh.rows.length})</span></button>
                    );})}
                  </div>
                )}
                {(() => {
                  var active = sheetData[sheetTab] || sheetData[0];
                  if (!active) return null;
                  return (
                  <div style={{overflowX:'auto',maxHeight:'70vh',overflowY:'auto'}}>
                    <table style={{width:'100%',borderCollapse:'collapse',fontSize:'12px'}}>
                      <thead>
                        <tr style={{position:'sticky',top:0,background:C.card,zIndex:1}}>
                          {active.headers.map(function(h,i){return <th key={i} style={{padding:'8px 10px',textAlign:'left',fontSize:'11px',color:C.accent,fontWeight:600,textTransform:'uppercase',borderBottom:'2px solid '+C.border,whiteSpace:'nowrap'}}>{h}</th>;})}
                        </tr>
                      </thead>
                      <tbody>
                        {active.rows.map(function(row,ri){return (
                          <tr key={ri} style={{borderBottom:'1px solid '+C.border,background:ri%2?'rgba(255,255,255,0.015)':'transparent'}}>
                            {row.map(function(cell,ci){
                              var str = String(cell);
                              var isUrl = /^https?:\/\//i.test(str.trim());
                              return <td key={ci} style={{padding:'6px 10px',color:C.dim,whiteSpace:'pre-wrap',wordBreak:'break-word',maxWidth:'400px',verticalAlign:'top'}}>{isUrl ? React.createElement('a',{href:str.trim(),target:'_blank',rel:'noopener noreferrer',style:{color:C.accent,textDecoration:'none',wordBreak:'break-all'}},str.trim()) : str}</td>;
                            })}
                          </tr>
                        );})}
                      </tbody>
                    </table>
                  </div>
                  );
                })()}
              </div>
            )}
          </div>
        )}

        {/* TIMELINE */}
        {view === 'timeline' && (
          <div style={{display:'flex',flexDirection:'column',gap:'20px'}}>
            <div style={{background:C.card,borderRadius:'12px',border:`1px solid ${C.border}`,padding:'16px'}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'10px'}}>
                <h3 style={{fontSize:'15px',fontWeight:600,margin:0}}>Sale Periods</h3>
                <button onClick={()=>setShowSaleAdd(!showSaleAdd)} style={{padding:'6px 12px',borderRadius:'6px',border:`1px solid ${C.red}40`,background:'transparent',color:C.red,fontSize:'12px',cursor:'pointer'}}>{showSaleAdd ? 'Cancel' : '+ Add sale period'}</button>
              </div>
              {showSaleAdd && (
                <div style={{display:'flex',gap:'8px',alignItems:'center',marginBottom:'12px',flexWrap:'wrap'}}>
                  <label style={{fontSize:'12px',color:C.dim}}>Start <input type="date" value={saleStart} onChange={e=>setSaleStart(e.target.value)} style={{marginLeft:'4px',padding:'5px 8px',borderRadius:'4px',border:`1px solid ${C.border}`,background:C.bg,color:C.text,fontSize:'13px'}} /></label>
                  <label style={{fontSize:'12px',color:C.dim}}>End <input type="date" value={saleEnd} onChange={e=>setSaleEnd(e.target.value)} style={{marginLeft:'4px',padding:'5px 8px',borderRadius:'4px',border:`1px solid ${C.border}`,background:C.bg,color:C.text,fontSize:'13px'}} /></label>
                  <button onClick={()=>{
                    if(!saleStart) return;
                    const dates = [];
                    const s = new Date(saleStart+'T12:00:00'); const e = saleEnd ? new Date(saleEnd+'T12:00:00') : s;
                    for(let d=new Date(s); d<=e; d.setDate(d.getDate()+1)) dates.push(d.toISOString().slice(0,10));
                    setSaleDays(prev => [...new Set([...prev, ...dates])].sort());
                    setSaleStart(''); setSaleEnd(''); setShowSaleAdd(false);
                  }} style={{padding:'6px 12px',borderRadius:'6px',border:`1px solid ${C.green}`,background:'transparent',color:C.green,fontSize:'12px',cursor:'pointer'}}>Add</button>
                </div>
              )}
              {saleDays.length > 0 ? (() => {
                const sorted = [...saleDays].sort();
                const ranges = [];
                let rangeStart = sorted[0], prev = sorted[0];
                for(let i=1; i<sorted.length; i++) {
                  const prevD = new Date(prev+'T12:00:00'); prevD.setDate(prevD.getDate()+1);
                  if(prevD.toISOString().slice(0,10) === sorted[i]) { prev = sorted[i]; }
                  else { ranges.push([rangeStart, prev]); rangeStart = sorted[i]; prev = sorted[i]; }
                }
                ranges.push([rangeStart, prev]);
                return (
                  <div style={{display:'flex',flexWrap:'wrap',gap:'8px'}}>
                    {ranges.map(([s,e],i) => (
                      <div key={i} style={{display:'flex',alignItems:'center',gap:'6px',padding:'6px 10px',borderRadius:'6px',background:C.red+'10',border:`1px solid ${C.red}30`}}>
                        <span style={{fontSize:'12px',color:C.red,fontWeight:500}}>{s === e ? s.slice(5) : `${s.slice(5)} \u2192 ${e.slice(5)}`}</span>
                        <button onClick={()=>{
                          const toRemove = new Set();
                          const sd = new Date(s+'T12:00:00'); const ed = new Date(e+'T12:00:00');
                          for(let d=new Date(sd); d<=ed; d.setDate(d.getDate()+1)) toRemove.add(d.toISOString().slice(0,10));
                          setSaleDays(prev => prev.filter(x => !toRemove.has(x)));
                        }} style={{fontSize:'11px',color:C.red,background:'transparent',border:'none',cursor:'pointer',padding:'0 2px'}}>{'\u2715'}</button>
                      </div>
                    ))}
                  </div>
                );
              })() : (
                <p style={{fontSize:'12px',color:C.muted}}>No sale periods set. Click "+ Add sale period" to mark promotional dates.</p>
              )}
            </div>
            <div style={{background:C.card,borderRadius:'12px',border:`1px solid ${C.border}`,padding:'12px',display:'flex',gap:'8px',alignItems:'center',flexWrap:'wrap'}}>
              {[['L7','7'],['L14','14'],['L30','30'],['L90','90'],['LY','365']].map(([label,days])=>{
                const d = parseInt(days);
                const end = new Date(); const start = new Date(); start.setDate(end.getDate()-d);
                const sv = start.toISOString().slice(0,10); const ev = end.toISOString().slice(0,10);
                const isActive = tlStart===sv && tlEnd===ev;
                return <button key={label} onClick={()=>{setTlStart(sv);setTlEnd(ev);}} style={{padding:'5px 12px',borderRadius:'5px',border:`1px solid ${isActive?C.accent:C.border}`,background:isActive?C.accent+'18':'transparent',color:isActive?C.accent:C.dim,fontSize:'12px',fontWeight:isActive?600:400,cursor:'pointer'}}>{label}</button>;
              })}
              <span style={{color:C.muted,fontSize:'12px'}}>|</span>
              <input type="date" value={tlStart} onChange={e=>setTlStart(e.target.value)} style={{padding:'5px 8px',borderRadius:'4px',border:`1px solid ${C.border}`,background:C.bg,color:C.text,fontSize:'13px'}} />
              <span style={{color:C.muted}}>to</span>
              <input type="date" value={tlEnd} onChange={e=>setTlEnd(e.target.value)} style={{padding:'5px 8px',borderRadius:'4px',border:`1px solid ${C.border}`,background:C.bg,color:C.text,fontSize:'13px'}} />
              {(tlStart||tlEnd) && <button onClick={()=>{setTlStart('');setTlEnd('');}} style={{fontSize:'12px',color:C.red,background:'transparent',border:'none',cursor:'pointer'}}>Clear</button>}
              <span style={{fontSize:'12px',color:C.muted,marginLeft:'auto'}}>{(() => { const fd = daily.filter(d => (!tlStart || d.date >= tlStart) && (!tlEnd || d.date <= tlEnd)); return `${fd.length} days`; })()}</span>
            </div>
            {(() => {
              var filteredDaily = daily.filter(function(d) { return (!tlStart || d.date >= tlStart) && (!tlEnd || d.date <= tlEnd); });
              var filteredPosts = attr.scored.filter(function(p) { return (!tlStart || p.date >= tlStart) && (!tlEnd || p.date <= tlEnd); });
              
              var scoreData = [];
              if (tlGroupBy === 'day') {
                var byDate = {};
                filteredPosts.forEach(function(p) {
                  if (!byDate[p.date]) byDate[p.date] = { eScores: [], lScores: [] };
                  byDate[p.date].eScores.push(p.score);
                  byDate[p.date].lScores.push(p.lScore);
                });
                Object.keys(byDate).sort().forEach(function(d) {
                  var v = byDate[d];
                  scoreData.push({ label: d.slice(5), avgE: Math.round(v.eScores.reduce(function(a,b){return a+b;},0) / v.eScores.length), avgL: Math.round(v.lScores.reduce(function(a,b){return a+b;},0) / v.lScores.length), posts: v.eScores.length });
                });
              } else if (tlGroupBy === 'week') {
                var byWeek = {};
                filteredPosts.forEach(function(p) {
                  var d = new Date(p.date + 'T12:00:00');
                  var sun = new Date(d); sun.setDate(d.getDate() - d.getDay());
                  var wk = sun.toISOString().slice(0, 10);
                  if (!byWeek[wk]) byWeek[wk] = { eScores: [], lScores: [] };
                  byWeek[wk].eScores.push(p.score);
                  byWeek[wk].lScores.push(p.lScore);
                });
                Object.keys(byWeek).sort().forEach(function(wk) {
                  var v = byWeek[wk];
                  scoreData.push({ label: wk.slice(5), avgE: Math.round(v.eScores.reduce(function(a,b){return a+b;},0) / v.eScores.length), avgL: Math.round(v.lScores.reduce(function(a,b){return a+b;},0) / v.lScores.length), posts: v.eScores.length });
                });
              } else {
                var byMonth = {};
                filteredPosts.forEach(function(p) {
                  var mo = p.date.slice(0, 7);
                  if (!byMonth[mo]) byMonth[mo] = { eScores: [], lScores: [] };
                  byMonth[mo].eScores.push(p.score);
                  byMonth[mo].lScores.push(p.lScore);
                });
                Object.keys(byMonth).sort().forEach(function(mo) {
                  var v = byMonth[mo];
                  var moNames = ['','Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
                  scoreData.push({ label: moNames[parseInt(mo.slice(5))] + ' ' + mo.slice(2,4), avgE: Math.round(v.eScores.reduce(function(a,b){return a+b;},0) / v.eScores.length), avgL: Math.round(v.lScores.reduce(function(a,b){return a+b;},0) / v.lScores.length), posts: v.eScores.length });
                });
              }
              
              return (<React.Fragment>
            <div style={{background:C.card,borderRadius:'12px',border:'1px solid '+C.border,padding:'20px'}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'16px'}}>
                <h2 style={{fontSize:'16px',fontWeight:600,margin:0}}>Avg E-Score & L-Score</h2>
                <div style={{display:'flex',background:C.bg,borderRadius:'6px',padding:'2px',border:'1px solid '+C.border}}>
                  {[['day','Day'],['week','Week'],['month','Month']].map(function(item){var k=item[0],l=item[1];return <button key={k} onClick={function(){setTlGroupBy(k);}} style={{padding:'5px 14px',borderRadius:'4px',border:'none',fontSize:'12px',fontWeight:tlGroupBy===k?600:400,cursor:'pointer',background:tlGroupBy===k?C.accent:'transparent',color:tlGroupBy===k?'#fff':C.dim}}>{l}</button>;})}
                </div>
              </div>
              <ResponsiveContainer width="100%" height={320}>
                <LineChart data={scoreData}>
                  <CartesianGrid strokeDasharray="3 3" stroke={C.border} />
                  <XAxis dataKey="label" stroke={C.muted} fontSize={11} interval={tlGroupBy==='day'?Math.max(0,Math.floor(scoreData.length/15)):0} angle={tlGroupBy==='day'?-35:0} textAnchor={tlGroupBy==='day'?'end':'middle'} height={tlGroupBy==='day'?60:30} />
                  <YAxis domain={[0,100]} stroke={C.muted} fontSize={11} />
                  <Tooltip contentStyle={{background:C.card,border:'1px solid '+C.border,borderRadius:'8px',color:C.text,fontSize:'12px'}} formatter={function(v,n){return [v,n];}} />
                  <Legend />
                  <ReferenceLine y={goals.eTarget} stroke={C.green} strokeDasharray="3 3" label={{value:'E Goal',fill:C.green,fontSize:10}} />
                  <ReferenceLine y={goals.lTarget} stroke={C.amber} strokeDasharray="3 3" label={{value:'L Goal',fill:C.amber,fontSize:10}} />
                  <Line type="monotone" dataKey="avgE" stroke={C.accent} strokeWidth={2} name="Avg E-Score" dot={scoreData.length<30} />
                  <Line type="monotone" dataKey="avgL" stroke={C.amber} strokeWidth={2} name="Avg L-Score" dot={scoreData.length<30} />
                </LineChart>
              </ResponsiveContainer>
            </div>
            <div style={{background:C.card,borderRadius:'12px',border:'1px solid '+C.border,padding:'20px'}}>
              <h2 style={{fontSize:'16px',fontWeight:600,margin:'0 0 16px'}}>Linktree Clicks vs {revUnlocked ? 'Revenue' : 'Orders'}</h2>
              <ResponsiveContainer width="100%" height={280}>
                <LineChart data={filteredDaily.filter(d=>d.lt_clicks>0)}>
                  <CartesianGrid strokeDasharray="3 3" stroke={C.border} />
                  <XAxis dataKey="date" tickFormatter={d=>d.slice(5)} stroke={C.muted} fontSize={11} />
                  <YAxis yAxisId="left" stroke={C.muted} fontSize={11} />
                  <YAxis yAxisId="right" orientation="right" stroke={C.muted} fontSize={11} tickFormatter={revUnlocked ? (v=>`$${(v/1000).toFixed(0)}K`) : undefined} />
                  <Tooltip contentStyle={{background:C.card,border:`1px solid ${C.border}`,borderRadius:'8px',color:C.text,fontSize:'12px'}} formatter={(v,n)=>[revUnlocked && n==='revenue'?`$${v.toLocaleString()}`:v,n]} />
                  <Legend />
                  <Line yAxisId="left" type="monotone" dataKey="lt_clicks" stroke={C.amber} strokeWidth={2} name="LT Clicks" dot={false} />
                  <Line yAxisId="right" type="monotone" dataKey={revUnlocked ? 'revenue' : 'orders'} stroke={revUnlocked ? C.green : C.accent} strokeWidth={2} name={revUnlocked ? 'Revenue' : 'Orders'} dot={false} opacity={0.5} />
                  {saleDays.map(d=><ReferenceLine key={d} x={d} stroke={C.red} strokeDasharray="3 3" yAxisId="left" />)}
                </LineChart>
              </ResponsiveContainer>
            </div>
              </React.Fragment>);
            })()}
          </div>
        )}

      </div>
    </div>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<NITMContentTracker />);
  </script>
</body>
</html>
