<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Medical Supplies — NITM Ops</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --accent: #0f766e; --accent-text: #ffffff;
    --red: #dc2626; --red-bg: #fee2e2; --amber: #b45309; --amber-bg: #fef3c7;
    --green: #15803d; --green-bg: #dcfce7;
  }
  :root[data-theme="dark"] {
    --accent: #14b8a6; --accent-text: #06211e;
    --red: #f87171; --red-bg: #431a1a; --amber: #fbbf24; --amber-bg: #422f06;
    --green: #4ade80; --green-bg: #10331c;
  }
  * { box-sizing: border-box; margin: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', system-ui, -apple-system, sans-serif; padding-bottom: 40px; }
  .wrap { max-width: 1100px; margin: 0 auto; padding: 0 12px; }

  .page-head { display: flex; align-items: center; gap: 10px; padding: 14px 2px 10px; }
  .page-head h1 { font-size: 19px; font-weight: 700; flex: 1; }
  .btn { border: 1px solid var(--border2); background: var(--panel); color: var(--text); border-radius: 10px;
         padding: 10px 14px; font: inherit; font-size: 14px; font-weight: 600; cursor: pointer; min-height: 44px; }
  .btn.primary { background: var(--accent); border-color: var(--accent); color: var(--accent-text); }
  .btn.danger { color: var(--red); }
  .btn:disabled { opacity: .5; cursor: default; }

  .tabs { display: flex; gap: 4px; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 4px; margin-bottom: 12px; }
  .tabs button { flex: 1; border: 0; background: transparent; color: var(--muted); font: inherit; font-size: 14px;
                 font-weight: 600; padding: 9px 4px; border-radius: 9px; cursor: pointer; min-height: 40px; }
  .tabs button.on { background: var(--panel); color: var(--text); box-shadow: 0 1px 3px rgba(0,0,0,.12); }
  .tabs button .cnt { font-size: 11px; color: var(--faint); font-weight: 500; }

  .search { width: 100%; padding: 11px 14px; font: inherit; font-size: 15px; border: 1px solid var(--border2);
            border-radius: 12px; background: var(--panel); color: var(--text); margin-bottom: 10px; }
  .chips { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 8px; margin-bottom: 6px; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
  .chips::-webkit-scrollbar { display: none; }
  .chip { flex: 0 0 auto; border: 1px solid var(--border2); background: var(--panel); color: var(--text2);
          border-radius: 999px; padding: 7px 13px; font: inherit; font-size: 13px; font-weight: 500; cursor: pointer; min-height: 36px; }
  .chip.on { background: var(--accent); border-color: var(--accent); color: var(--accent-text); }

  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; }
  .card { background: var(--panel); border: 1px solid var(--border); border-radius: 14px; overflow: hidden;
          cursor: pointer; text-align: left; padding: 0; font: inherit; color: var(--text); display: flex; flex-direction: column; }
  .card:active { transform: scale(.98); }
  .thumb { aspect-ratio: 4/3; background: var(--surface); display: flex; align-items: center; justify-content: center;
           font-size: 34px; color: var(--faint); overflow: hidden; }
  .thumb img { width: 100%; height: 100%; object-fit: cover; }
  .card-body { padding: 9px 11px 11px; display: flex; flex-direction: column; gap: 3px; flex: 1; }
  .card-name { font-size: 13.5px; font-weight: 600; line-height: 1.25; }
  .card-sub { font-size: 11.5px; color: var(--muted); }
  .card-foot { margin-top: auto; padding-top: 5px; display: flex; align-items: center; gap: 6px; }
  .stock { font-size: 12.5px; font-weight: 700; }
  .badge { font-size: 10.5px; font-weight: 700; padding: 2px 7px; border-radius: 999px; }
  .badge.out { background: var(--red-bg); color: var(--red); }
  .badge.low { background: var(--amber-bg); color: var(--amber); }
  .badge.unc { background: var(--surface); color: var(--muted); }
  .badge.order { background: var(--green-bg); color: var(--green); }

  .rows { display: flex; flex-direction: column; gap: 8px; }
  .sec-label { font-size: 12px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .6px; margin: 14px 2px 2px; }
  .row { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 10px 12px;
         display: flex; align-items: center; gap: 11px; }
  .row .rthumb { width: 46px; height: 46px; border-radius: 9px; background: var(--surface); flex: 0 0 auto;
                 display: flex; align-items: center; justify-content: center; font-size: 20px; color: var(--faint); overflow: hidden; cursor: pointer; }
  .row .rthumb img { width: 100%; height: 100%; object-fit: cover; }
  .row .rmain { flex: 1; min-width: 0; }
  .row .rname { font-size: 14px; font-weight: 600; line-height: 1.25; }
  .row .rsub { font-size: 12px; color: var(--muted); margin-top: 1px; }
  .row .racts { display: flex; gap: 6px; flex: 0 0 auto; flex-wrap: wrap; justify-content: flex-end; }
  .sm-btn { border: 1px solid var(--border2); background: var(--surface); color: var(--text); border-radius: 8px;
            padding: 7px 10px; font: inherit; font-size: 12.5px; font-weight: 600; cursor: pointer; min-height: 36px; }
  .sm-btn.primary { background: var(--accent); border-color: var(--accent); color: var(--accent-text); }
  .link-btn { color: var(--accent); text-decoration: none; font-size: 12.5px; font-weight: 600; padding: 7px 4px; }

  .empty { text-align: center; color: var(--muted); padding: 46px 10px; font-size: 14px; }

  /* bottom sheet */
  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 1100; display: none; }
  .overlay.open { display: block; }
  .sheet { position: fixed; left: 0; right: 0; bottom: 0; z-index: 1101; background: var(--panel);
           border-radius: 18px 18px 0 0; border: 1px solid var(--border); border-bottom: 0;
           max-height: 88vh; overflow-y: auto; padding: 10px 16px calc(18px + env(safe-area-inset-bottom));
           transform: translateY(105%); transition: transform .22s ease; }
  .sheet.open { transform: none; }
  @media (min-width: 700px) { .sheet { max-width: 560px; margin: 0 auto; } }
  .grip { width: 40px; height: 4px; border-radius: 2px; background: var(--border2); margin: 2px auto 12px; }
  .sheet-photo { width: 100%; max-height: 230px; border-radius: 12px; background: var(--surface); object-fit: contain; display: block; }
  .sheet-photo.ph { display: flex; align-items: center; justify-content: center; height: 110px; font-size: 40px; color: var(--faint); }
  .sheet h2 { font-size: 18px; margin: 12px 0 2px; }
  .meta { font-size: 13px; color: var(--muted); line-height: 1.5; }
  .meta b { color: var(--text2); font-weight: 600; }
  .sheet-stock { display: flex; align-items: center; gap: 8px; margin: 10px 0 4px; font-size: 15px; font-weight: 700; }
  .acts { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 12px; }
  .acts .btn.full { grid-column: 1 / -1; }

  .panel { border: 1px solid var(--border); border-radius: 12px; padding: 12px; margin-top: 12px; background: var(--bg); }
  .panel h3 { font-size: 14px; margin-bottom: 10px; }
  .frow { margin-bottom: 10px; }
  .frow label { display: block; font-size: 12px; font-weight: 600; color: var(--muted); margin-bottom: 4px; }
  .frow input, .frow select, .frow textarea { width: 100%; padding: 10px 12px; font: inherit; font-size: 15px;
    border: 1px solid var(--border2); border-radius: 10px; background: var(--panel); color: var(--text); min-height: 44px; }
  .frow textarea { min-height: 64px; resize: vertical; }
  .stepper { display: flex; align-items: center; gap: 10px; }
  .stepper button { width: 48px; height: 44px; font-size: 22px; border: 1px solid var(--border2); background: var(--panel);
                    color: var(--text); border-radius: 10px; cursor: pointer; }
  .stepper input { width: 70px; text-align: center; font-size: 18px; font-weight: 700; }
  .mini { display: inline-flex; align-items: center; gap: 4px; }
  .mini button { width: 34px; height: 34px; border: 1px solid var(--border2); background: var(--panel);
                 color: var(--text); border-radius: 8px; font-size: 17px; cursor: pointer; flex: 0 0 auto; }
  .mini .mv { min-width: 26px; text-align: center; font-weight: 700; font-size: 15px; }
  .seg { display: flex; gap: 6px; }
  .seg button { flex: 1; border: 1px solid var(--border2); background: var(--panel); color: var(--text2); border-radius: 10px;
                padding: 10px 4px; font: inherit; font-size: 14px; font-weight: 600; cursor: pointer; min-height: 44px; }
  .seg button.on { background: var(--accent); border-color: var(--accent); color: var(--accent-text); }
  .panel-acts { display: flex; gap: 8px; margin-top: 6px; }
  .panel-acts .btn { flex: 1; }

  .move { display: flex; align-items: center; gap: 10px; background: var(--panel); border: 1px solid var(--border);
          border-radius: 12px; padding: 10px 12px; }
  .move .mico { font-size: 18px; flex: 0 0 auto; }
  .move .mmain { flex: 1; min-width: 0; }
  .move .mtitle { font-size: 13.5px; font-weight: 600; }
  .move .msub { font-size: 12px; color: var(--muted); margin-top: 1px; }
  .move .legacy { color: var(--faint); font-style: italic; }
  .undo { border: 0; background: none; color: var(--red); font: inherit; font-size: 12.5px; font-weight: 600; cursor: pointer; padding: 8px; }

  .toast { position: fixed; left: 50%; bottom: 24px; transform: translateX(-50%); z-index: 1200;
           background: var(--text); color: var(--bg); font-size: 14px; font-weight: 600;
           padding: 11px 18px; border-radius: 999px; opacity: 0; transition: opacity .2s; pointer-events: none; max-width: 90vw; }
  .toast.show { opacity: 1; }
</style>
</head>
<body>
<script defer src="/shared/nav.js"></script>

<div class="wrap">
  <div class="page-head">
    <h1>🩺 Medical Supplies</h1>
    <button class="btn primary" id="addItemBtn">+ Add item</button>
  </div>

  <div class="tabs" id="tabs">
    <button data-tab="inv" class="on">Inventory <span class="cnt" id="cntInv"></span></button>
    <button data-tab="shop">Shopping List <span class="cnt" id="cntShop"></span></button>
    <button data-tab="bags">Bags <span class="cnt" id="cntBags"></span></button>
    <button data-tab="log">Activity</button>
  </div>

  <div id="tab-inv">
    <input class="search" id="search" type="search" placeholder="Search items, categories, notes…">
    <div class="chips" id="chips"></div>
    <div class="grid" id="grid"></div>
    <div class="empty" id="invEmpty" style="display:none">No items match.</div>
  </div>

  <div id="tab-shop" style="display:none"><div id="shopBody"></div></div>

  <div id="tab-bags" style="display:none"><div id="bagsBody"></div></div>

  <div id="tab-log" style="display:none"><div class="rows" id="logBody" style="margin-top:4px"></div></div>
</div>

<div class="overlay" id="overlay"></div>
<div class="sheet" id="sheet"></div>
<div class="toast" id="toast"></div>
<datalist id="videoList"></datalist>
<input type="file" id="photoInput" accept="image/*" capture="environment" style="display:none">

<script>
const API = '/med-supplies/api';
const USERS = ['Molly', 'Diana', 'Tia'];

let items = [], categories = [], videos = [], bagLines = [], bags = [];
let activeCat = null, searchTerm = '', currentItem = null, photoTarget = null;
let openBag = null, pickerForBag = false;

const $ = (id) => document.getElementById(id);
const esc = (s) => String(s ?? '').replace(/[&<>"']/g, (c) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const imgUrl = (key) => key ? `${API}/img/${encodeURIComponent(key).replace(/%2F/g, '/')}` : null;

function toast(msg) {
  const t = $('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._h);
  t._h = setTimeout(() => t.classList.remove('show'), 2200);
}

// compact − N + control; returns {get, set}
function miniStep(el, { value = 1, min = 1, max = Infinity } = {}) {
  el.classList.add('mini');
  el.innerHTML = `<button type="button" data-d="-1">−</button><span class="mv">${value}</span><button type="button" data-d="1">+</button>`;
  const mv = el.querySelector('.mv');
  el.querySelectorAll('button').forEach((b) => b.onclick = (ev) => {
    ev.stopPropagation();
    mv.textContent = Math.max(min, Math.min(max, parseInt(mv.textContent, 10) + parseInt(b.dataset.d, 10)));
  });
  return { get: () => parseInt(mv.textContent, 10), set: (v) => { mv.textContent = v; } };
}
// two-tap confirm: first tap arms the button, second tap within 2.5s runs fn
function armConfirm(btn, fn, label = 'Sure?') {
  if (btn.dataset.armed) { delete btn.dataset.armed; fn(); return; }
  btn.dataset.armed = '1';
  const old = btn.textContent;
  btn.textContent = label;
  setTimeout(() => { if (btn.isConnected && btn.dataset.armed) { delete btn.dataset.armed; btn.textContent = old; } }, 2500);
}

async function api(path, opts = {}) {
  if (opts.body && !(opts.body instanceof Blob)) {
    opts.headers = { 'Content-Type': 'application/json', ...opts.headers };
    opts.body = JSON.stringify(opts.body);
  }
  const res = await fetch(API + path, opts);
  const data = await res.json().catch(() => ({}));
  if (!res.ok || data.success === false) throw new Error(data.error || `HTTP ${res.status}`);
  return data.data;
}

// ── current user (remembered; first visit seeded from the Access login email) ──
function getUser() {
  try { const u = localStorage.getItem('med-user'); if (u) return u; } catch (e) {}
  return null;
}
function setUser(u) { try { localStorage.setItem('med-user', u); } catch (e) {} }
async function seedUserFromEmail() {
  if (getUser()) return;
  try {
    const me = await api('/me');
    const prefix = (me.email || '').split('@')[0].toLowerCase();
    const hit = USERS.find((u) => prefix.includes(u.toLowerCase()));
    if (hit) setUser(hit);
  } catch (e) {}
}

// ── stock badges ──
function badge(it) {
  if (it.uncounted) return '<span class="badge unc">Uncounted</span>';
  if (it.remaining <= 0) return '<span class="badge out">Out</span>';
  if (it.restock_level != null && it.remaining <= it.restock_level) return '<span class="badge low">Low</span>';
  return '';
}
function orderBadge(it) {
  if (it.order_status === 'to_order') return '<span class="badge order">To order</span>';
  if (it.order_status === 'ordered') return '<span class="badge order">Ordered</span>';
  return '';
}

// ── data loads ──
async function loadAll() {
  const [i, c, v, b, g] = await Promise.all([api('/items'), api('/categories'), api('/videos'), api('/bag-items'), api('/bags')]);
  items = i; categories = c; videos = v; bagLines = b; bags = g;
  $('videoList').innerHTML = videos.map((v) => `<option value="${esc(v)}">`).join('');
  renderChips(); renderInventory(); renderShopping(); renderBags();
}
async function reloadItems() {
  [items, bagLines, bags] = await Promise.all([api('/items'), api('/bag-items'), api('/bags')]);
  renderInventory(); renderShopping(); renderBags();
}

// ── inventory tab ──
function renderChips() {
  const counts = {};
  items.forEach((it) => { if (it.category) counts[it.category] = (counts[it.category] || 0) + 1; });
  let html = `<button class="chip${activeCat === null ? ' on' : ''}" data-cat="">All</button>`;
  categories.forEach((c) => {
    if (!counts[c.name]) return;
    html += `<button class="chip${activeCat === c.name ? ' on' : ''}" data-cat="${esc(c.name)}">${c.icon || ''} ${esc(c.name)}</button>`;
  });
  $('chips').innerHTML = html;
  $('chips').querySelectorAll('.chip').forEach((b) => b.onclick = () => {
    activeCat = b.dataset.cat || null;
    renderChips(); renderInventory();
  });
}

function filteredItems() {
  const q = searchTerm.trim().toLowerCase();
  return items.filter((it) => {
    if (activeCat && it.category !== activeCat) return false;
    if (!q) return true;
    return [it.name, it.category, it.notes, it.simulated_label, it.dose, it.size, it.sublocation]
      .some((f) => f && f.toLowerCase().includes(q));
  });
}

function renderInventory() {
  const list = filteredItems();
  $('cntInv').textContent = `(${items.length})`;
  $('invEmpty').style.display = list.length ? 'none' : '';
  $('grid').innerHTML = list.map((it) => {
    const img = imgUrl(it.primary_image_key);
    const sub = [it.dose, it.size].filter(Boolean).join(' · ');
    return `<button class="card" data-id="${esc(it.id)}">
      <div class="thumb">${img ? `<img loading="lazy" src="${img}" alt="" onerror="this.parentNode.textContent='🩹'">` : '🩹'}</div>
      <div class="card-body">
        <div class="card-name">${esc(it.name)}</div>
        ${sub ? `<div class="card-sub">${esc(sub)}</div>` : ''}
        <div class="card-foot">
          <span class="stock">${it.uncounted ? '—' : it.remaining}</span>
          ${badge(it)} ${orderBadge(it)}
        </div>
      </div>
    </button>`;
  }).join('');
  $('grid').querySelectorAll('.card').forEach((c) => c.onclick = () => openItem(c.dataset.id));
}

// ── shopping list tab ──
function renderShopping() {
  const toOrder = items.filter((it) => it.order_status === 'to_order');
  const ordered = items.filter((it) => it.order_status === 'ordered');
  const low = items.filter((it) => it.order_status === 'none' && !it.uncounted &&
    ((it.restock_level != null && it.remaining <= it.restock_level) || it.remaining <= 0));
  $('cntShop').textContent = `(${toOrder.length + ordered.length})`;

  const row = (it, acts) => {
    const img = imgUrl(it.primary_image_key);
    return `<div class="row">
      <div class="rthumb" data-open="${esc(it.id)}">${img ? `<img loading="lazy" src="${img}" alt="" onerror="this.parentNode.textContent='🩹'">` : '🩹'}</div>
      <div class="rmain">
        <div class="rname">${esc(it.name)}</div>
        <div class="rsub">${it.uncounted ? 'uncounted' : `${it.remaining} left`}${it.qty_to_order ? ` · need ${it.qty_to_order}` : ''}</div>
      </div>
      <div class="racts">${it.purchase_link ? `<a class="link-btn" href="${esc(it.purchase_link)}" target="_blank" rel="noopener">Buy ↗</a>` : ''}${acts}</div>
    </div>`;
  };

  let html = '';
  if (toOrder.length) html += `<div class="sec-label">To order (${toOrder.length})</div><div class="rows">` +
    toOrder.map((it) => row(it, `<button class="sm-btn primary" data-act="ordered" data-id="${esc(it.id)}">Mark ordered</button>`)).join('') + '</div>';
  if (ordered.length) html += `<div class="sec-label">Ordered — waiting (${ordered.length})</div><div class="rows">` +
    ordered.map((it) => row(it, `<button class="sm-btn primary" data-act="received" data-id="${esc(it.id)}">Received</button>`)).join('') + '</div>';
  if (low.length) html += `<div class="sec-label">Low stock (${low.length})</div><div class="rows">` +
    low.map((it) => row(it, `<button class="sm-btn" data-act="toorder" data-id="${esc(it.id)}">Add to order</button>`)).join('') + '</div>';
  $('shopBody').innerHTML = html || '<div class="empty">Shopping list is empty 🎉</div>';

  $('shopBody').querySelectorAll('[data-open]').forEach((el) => el.onclick = () => openItem(el.dataset.open));
  $('shopBody').querySelectorAll('[data-act]').forEach((b) => b.onclick = async () => {
    const it = items.find((x) => x.id === b.dataset.id);
    if (b.dataset.act === 'ordered') {
      try {
        await api(`/items/${encodeURIComponent(it.id)}`, { method: 'PUT', body: { order_status: 'ordered' } });
        toast('Marked ordered');
        await reloadItems();
      } catch (e) { toast('Error: ' + e.message); }
      return;
    }
    // received / add-to-order: swap the row's buttons for an inline qty stepper
    const isRecv = b.dataset.act === 'received';
    const racts = b.closest('.racts');
    racts.innerHTML = '';
    const stepEl = document.createElement('span');
    racts.appendChild(stepEl);
    const s = miniStep(stepEl, { value: isRecv ? (it.qty_to_order || 1) : Math.max(1, (it.restock_level || 0) - it.remaining + 1) });
    const go = document.createElement('button');
    go.className = 'sm-btn primary';
    go.textContent = isRecv ? '✓ To shelf' : '✓ To list';
    go.onclick = async () => {
      const qty = s.get();
      go.disabled = true;
      try {
        if (isRecv) {
          await api('/receive', { method: 'POST', body: { item_id: it.id, qty, user_name: getUser() } });
          toast(`Restocked ${qty} — off the list`);
        } else {
          await api(`/items/${encodeURIComponent(it.id)}`, { method: 'PUT', body: { order_status: 'to_order', qty_to_order: qty } });
          toast('Added to order list');
        }
        await reloadItems();
      } catch (e) { toast('Error: ' + e.message); go.disabled = false; }
    };
    const no = document.createElement('button');
    no.className = 'sm-btn';
    no.textContent = '✕';
    no.onclick = () => renderShopping();
    racts.appendChild(go);
    racts.appendChild(no);
  });
}

// ── activity tab ──
const MOVE_ICON = { checkout: '📤', receive: '📥', adjust: '🔧', return: '↩️' };
function fmtWhen(ts) {
  if (!ts) return '';
  const d = new Date(ts.includes('T') ? ts : ts.replace(' ', 'T') + 'Z');
  if (isNaN(d)) return ts;
  const days = (Date.now() - d.getTime()) / 86400000;
  if (days < 1) return d.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
  if (days < 300) return d.toLocaleDateString([], { month: 'short', day: 'numeric' });
  return d.toLocaleDateString([], { month: 'short', day: 'numeric', year: 'numeric' });
}
async function renderLog() {
  const moves = await api('/moves?limit=100');
  $('logBody').innerHTML = moves.map((m) => {
    const qty = Math.abs(m.qty_delta);
    const what = m.type === 'checkout' ? `took ${qty}`
      : m.type === 'receive' ? `restocked ${qty}`
      : m.type === 'return' ? `returned ${qty}`
      : `adjusted ${m.qty_delta > 0 ? '+' : ''}${m.qty_delta}`;

// ── photo upload: downscale on-device, then PUT raw JPEG bytes ──
$('photoInput').onchange = async () => {
  const file = $('photoInput').files[0];
  $('photoInput').value = '';
  if (!file || !photoTarget) return;
  toast('Uploading photo…');
  try {
    const blob = await downscale(file, 1600);
    const res = await fetch(`${API}/img/items/${encodeURIComponent(photoTarget)}/primary`, {
      method: 'PUT', headers: { 'Content-Type': 'image/jpeg' }, body: blob,
    });
    const data = await res.json();
    if (!res.ok || data.success === false) throw new Error(data.error || `HTTP ${res.status}`);
    toast('Photo saved');
    const id = photoTarget;
    await reloadItems();
    if (currentItem) openItem(id);
  } catch (e) { toast('Error: ' + e.message); }
  photoTarget = null;
};
function downscale(file, maxDim) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => {
      const scale = Math.min(1, maxDim / Math.max(img.width, img.height));
      const canvas = document.createElement('canvas');
      canvas.width = Math.round(img.width * scale);
      canvas.height = Math.round(img.height * scale);
      canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
      canvas.toBlob((b) => b ? resolve(b) : reject(new Error('could not encode image')), 'image/jpeg', 0.85);
      URL.revokeObjectURL(img.src);
    };
    img.onerror = () => reject(new Error('could not read image'));
    img.src = URL.createObjectURL(file);
  });
}

// ── bags (sim-lab packing lists per video) ──
function lineStatus(line) {
  const it = items.find((x) => x.id === line.item_id);
  if (!it) return { key: 'gone', chip: '<span class="badge unc">item archived</span>', it: null };
  if (line.packed_move_id) return { key: 'packed', chip: '<span class="badge order">Packed ✓</span>', it };
  if (it.uncounted) return { key: 'uncounted', chip: '<span class="badge unc">Uncounted</span>', it };
  if (it.remaining <= 0) return { key: 'buy', chip: '<span class="badge out">Not in office</span>', it, shortfall: line.qty_needed };
  if (it.remaining < line.qty_needed) return { key: 'short', chip: `<span class="badge low">Short ${line.qty_needed - it.remaining}</span>`, it, shortfall: line.qty_needed - it.remaining };
  return { key: 'ready', chip: '<span class="badge order">Ready</span>', it };
}
function bagsByVideo() {
  const map = {};
  bagLines.forEach((l) => { (map[l.video_name] = map[l.video_name] || []).push(l); });
  return map;
}

function bagInfo(video) { return bags.find((b) => b.video_name === video); }

function renderBags() {
  const map = bagsByVideo();
  const names = [...new Set([...bags.map((b) => b.video_name), ...Object.keys(map)])].sort().reverse();
  const active = names.filter((v) => (bagInfo(v)?.status || 'active') !== 'done');
  const done = names.filter((v) => bagInfo(v)?.status === 'done');
  $('cntBags').textContent = active.length ? `(${active.length})` : '';
  if (openBag !== null) return renderBagDetail();

  const activeRow = (v) => {
    const lines = map[v] || [];
    const st = lines.map(lineStatus);
    const packed = st.filter((s) => s.key === 'packed').length;
    const buy = st.filter((s) => s.key === 'buy' || s.key === 'short').length;
    const allPacked = lines.length > 0 && packed === lines.length;
    return `<div class="row" style="cursor:pointer" data-bag="${esc(v)}">
      <div class="rthumb">🎒</div>
      <div class="rmain">
        <div class="rname">${esc(v)}</div>
        <div class="rsub">${lines.length} item${lines.length === 1 ? '' : 's'} · ${packed} packed${buy ? ` · <b style="color:var(--amber)">${buy} to buy</b>` : ''}</div>
      </div>
      <div class="racts">${allPacked ? '<span class="badge order">Packed ✓</span>' : ''}<span style="color:var(--faint)">›</span></div>
    </div>`;
  };
  const doneRow = (v) => {
    const lines = map[v] || [];
    const used = lines.reduce((n, l) => n + (l.return_move_id !== null || l.qty_returned !== null ? l.qty_needed - (l.qty_returned || 0) : 0), 0);
    const back = lines.reduce((n, l) => n + (l.qty_returned || 0), 0);
    return `<div class="row" style="cursor:pointer;opacity:.75" data-bag="${esc(v)}">
      <div class="rthumb">✅</div>
      <div class="rmain">
        <div class="rname">${esc(v)}</div>
        <div class="rsub">${back} returned · ${used} used up</div>
      </div>
      <div class="racts"><span style="color:var(--faint)">›</span></div>
    </div>`;
  };

  let html = `<div style="margin:4px 0 10px"><button class="btn primary" id="newBagBtn">🎒 New bag</button></div>`;
  if (!active.length && !done.length) html += '<div class="empty">No bags yet. Make one per video, then assign the supplies it needs.</div>';
  if (active.length) html += '<div class="rows">' + active.map(activeRow).join('') + '</div>';
  if (done.length) html += `<div class="sec-label">Done — returned after filming (${done.length})</div><div class="rows">` + done.map(doneRow).join('') + '</div>';
  $('bagsBody').innerHTML = html;
  $('bagsBody').querySelectorAll('[data-bag]').forEach((el) => el.onclick = () => { openBag = el.dataset.bag; renderBags(); });
  $('newBagBtn').onclick = () => {
    $('bagsBody').querySelector('#newBagBtn').insertAdjacentHTML('afterend', `
      <div class="panel" id="newBagPanel" style="margin:10px 0">
        <div class="frow"><label>Video / bag name</label><input id="nbName" list="videoList" placeholder="e.g. 2026.1852 - Blood transfusion"></div>
        <div class="panel-acts">
          <button class="btn" id="nbCancel">Cancel</button>
          <button class="btn primary" id="nbGo">Open bag</button>
        </div>
      </div>`);
    $('newBagBtn').style.display = 'none';
    $('nbName').focus();
    $('nbCancel').onclick = () => renderBags();
    $('nbGo').onclick = () => {
      const v = $('nbName').value.trim();
      if (!v) return toast('Enter a video name');
      openBag = v; renderBags();
    };
  };
}

function renderBagDetail() {
  const lines = bagsByVideo()[openBag] || [];
  const isDone = bagInfo(openBag)?.status === 'done';
  const st = lines.map((l) => ({ line: l, s: lineStatus(l) }));
  const packed = st.filter((x) => x.s.key === 'packed').length;
  const shortfalls = st.filter((x) => x.s.shortfall > 0);

  // ---- done bag: read-only summary of what was returned vs used up ----
  if (isDone) {
    const used = lines.reduce((n, l) => n + (l.packed_move_id ? l.qty_needed - (l.qty_returned || 0) : 0), 0);
    const back = lines.reduce((n, l) => n + (l.qty_returned || 0), 0);
    $('bagsBody').innerHTML = `

        <button class="btn" id="bagReopen">Reopen bag</button>

      </div>
      <div class="rows">` + lines.map((l) => {
        const it = items.find((x) => x.id === l.item_id);
        const img = it ? imgUrl(it.primary_image_key) : null;
        const usedQty = l.packed_move_id ? l.qty_needed - (l.qty_returned || 0) : 0;
        const detail = !l.packed_move_id ? 'never packed'
          : usedQty === 0 ? `all ${l.qty_needed} returned`
          : (l.qty_returned || 0) === 0 ? `all ${l.qty_needed} used up`
          : `${l.qty_returned} returned · ${usedQty} used up`;
        return `<div class="row">
          <div class="rthumb" ${it ? `data-open="${esc(it.id)}"` : ''}>${img ? `<img loading="lazy" src="${img}" alt="" onerror="this.parentNode.textContent='🩹'">` : '🩹'}</div>
          <div class="rmain">
            <div class="rname">${esc(it ? it.name : (l.item_name || 'archived item'))}</div>
            <div class="rsub">${detail}</div>
          </div>
        </div>`;
      }).join('') + '</div>';
    $('bagBack').onclick = () => { openBag = null; renderBags(); };
    $('bagsBody').querySelectorAll('[data-open]').forEach((el) => el.onclick = () => openItem(el.dataset.open));
    $('bagReopen').onclick = async () => {
      try { await api(`/bags/${encodeURIComponent(openBag)}/reopen`, { method: 'POST', body: {} }); toast('Bag reopened'); await reloadItems(); }
      catch (e) { toast('Error: ' + e.message); }
    };
    $('bagDelete').onclick = () => armConfirm($('bagDelete'), async () => {
      try { await api(`/bags/${encodeURIComponent(openBag)}`, { method: 'DELETE' }); openBag = null; toast('Bag deleted'); await reloadItems(); }
      catch (e) { toast('Error: ' + e.message); }
    }, 'Delete?');
    return;
  }

  // ---- active bag: packing checklist ----
  let html = `
    <div style="display:flex;align-items:center;gap:10px;margin:4px 0 2px">
      <button class="btn" id="bagBack">‹ Bags</button>
      <div style="flex:1;min-width:0">
        <div style="font-size:16px;font-weight:700;line-height:1.3">🎒 ${esc(openBag)}</div>
        <div style="font-size:12.5px;color:var(--muted)">${lines.length ? `${packed}/${lines.length} packed` : 'empty bag'}${shortfalls.length ? ` · ${shortfalls.length} need buying` : ''}</div>
      </div>
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin:10px 0">
      <button class="btn primary" id="bagAdd">＋ Add supplies</button>
      ${shortfalls.length ? `<button class="btn" id="bagShort">🛒 Send ${shortfalls.length} to shopping list</button>` : ''}
      ${packed ? `<button class="btn" id="bagReturn">↩ Return bag…</button>` : ''}
      ${lines.length ? `<button class="btn danger" id="bagDelete">Delete bag</button>` : ''}
    </div>`;

  if (!lines.length) html += '<div class="empty">Nothing assigned yet — tap “Add supplies”.</div>';
  html += '<div class="rows">' + st.map(({ line, s }) => {
    const img = s.it ? imgUrl(s.it.primary_image_key) : null;
    const name = s.it ? s.it.name : (line.item_name || 'archived item');
    const stock = s.it ? (s.it.uncounted ? '' : `${s.it.remaining} at office`) : '';
    return `<div class="row">
      <div class="rthumb" ${s.it ? `data-open="${esc(s.it.id)}"` : ''}>${img ? `<img loading="lazy" src="${img}" alt="" onerror="this.parentNode.textContent='🩹'">` : '🩹'}</div>
      <div class="rmain">
        <div class="rname">${esc(name)}</div>
        <div class="rsub" data-sub="${esc(line.item_id)}"><button class="sm-btn" data-qty="${esc(line.item_id)}" style="padding:3px 8px;min-height:26px">need ${line.qty_needed} ✎</button>${stock ? ' · ' + stock : ''}${s.key === 'uncounted' && s.it ? ` <button class="sm-btn" data-count="${esc(s.it.id)}" style="padding:3px 8px;min-height:26px">Count now</button>` : ''}</div>
      </div>
      <div class="racts">
        ${s.chip}
        ${s.key === 'packed'
          ? `<button class="sm-btn" data-unpack="${esc(line.item_id)}">Unpack</button>`
          : (s.it ? `<button class="sm-btn primary" data-pack="${esc(line.item_id)}">Pack</button>` : '')}
        <button class="sm-btn" data-rm="${esc(line.item_id)}" title="Remove from bag">✕</button>
      </div>
    </div>`;
  }).join('') + '</div>';
  $('bagsBody').innerHTML = html;

  $('bagBack').onclick = () => { openBag = null; renderBags(); };
  $('bagAdd').onclick = () => openPicker();
  $('bagsBody').querySelectorAll('[data-open]').forEach((el) => el.onclick = () => openItem(el.dataset.open));

  const bagShortBtn = $('bagShort');
  if (bagShortBtn) bagShortBtn.onclick = async () => {
    bagShortBtn.disabled = true;
    try {
      for (const { s } of shortfalls) {
        await api(`/items/${encodeURIComponent(s.it.id)}`, { method: 'PUT', body: {
          order_status: s.it.order_status === 'ordered' ? 'ordered' : 'to_order',
          qty_to_order: (s.it.qty_to_order || 0) + s.shortfall,
        }});
      }
      toast(`Added ${shortfalls.length} item${shortfalls.length === 1 ? '' : 's'} to shopping list`);
      await reloadItems();
    } catch (e) { toast('Error: ' + e.message); bagShortBtn.disabled = false; }
  };
  const bagReturnBtn = $('bagReturn');
  if (bagReturnBtn) bagReturnBtn.onclick = openReturnSheet;
  const bagDeleteBtn = $('bagDelete');
  if (bagDeleteBtn) bagDeleteBtn.onclick = () => armConfirm(bagDeleteBtn, async () => {
    try { await api(`/bags/${encodeURIComponent(openBag)}`, { method: 'DELETE' }); openBag = null; toast('Bag deleted'); await reloadItems(); }
    catch (e) { toast('Error: ' + e.message); }
  }, 'Delete?');

  // tap "need N" -> inline stepper right in the row
  $('bagsBody').querySelectorAll('[data-qty]').forEach((b) => b.onclick = (ev) => {
    ev.stopPropagation();
    const line = lines.find((l) => l.item_id === b.dataset.qty);
    if (line.packed_move_id) return toast('Unpack first, then change the quantity');
    const sub = $('bagsBody').querySelector(`[data-sub="${CSS.escape(line.item_id)}"]`);
    sub.innerHTML = '';
    const stepEl = document.createElement('span');
    sub.appendChild(stepEl);
    const s = miniStep(stepEl, { value: line.qty_needed, min: 1 });
    const goBtn = document.createElement('button');
    goBtn.className = 'sm-btn primary'; goBtn.textContent = '✓';
    goBtn.onclick = async () => {
      goBtn.disabled = true;
      try { await api('/bag-items', { method: 'PUT', body: { video_name: openBag, item_id: line.item_id, qty_needed: s.get() } }); await reloadItems(); }
      catch (e) { toast('Error: ' + e.message); renderBags(); }
    };
    const noBtn = document.createElement('button');
    noBtn.className = 'sm-btn'; noBtn.textContent = '✕';
    noBtn.onclick = () => renderBags();
    sub.appendChild(goBtn); sub.appendChild(noBtn);
  });
  $('bagsBody').querySelectorAll('[data-count]').forEach((b) => b.onclick = (ev) => {
    ev.stopPropagation();
    openItem(b.dataset.count);
    showRecountPanel();
  });
  $('bagsBody').querySelectorAll('[data-pack]').forEach((b) => b.onclick = async () => {
    b.disabled = true;
    try {
      const r = await api('/bag-items/pack', { method: 'POST', body: { video_name: openBag, item_id: b.dataset.pack, user_name: getUser() } });
      toast(`Packed — ${r.item.remaining} left at office`);
      await reloadItems();
    } catch (e) { toast('Error: ' + e.message); b.disabled = false; }
  });
  $('bagsBody').querySelectorAll('[data-unpack]').forEach((b) => b.onclick = async () => {
    b.disabled = true;
    try { await api('/bag-items/unpack', { method: 'POST', body: { video_name: openBag, item_id: b.dataset.unpack } }); toast('Unpacked — stock restored'); await reloadItems(); }
    catch (e) { toast('Error: ' + e.message); b.disabled = false; }
  });
  $('bagsBody').querySelectorAll('[data-rm]').forEach((b) => b.onclick = () => armConfirm(b, async () => {
    try { await api(`/bag-items?video_name=${encodeURIComponent(openBag)}&item_id=${encodeURIComponent(b.dataset.rm)}`, { method: 'DELETE' }); await reloadItems(); }
    catch (e) { toast('Error: ' + e.message); }
  }));
}

// return-bag sheet: what came back on the shelf vs got used up during filming
function openReturnSheet() {
  const packedLines = (bagsByVideo()[openBag] || []).filter((l) => l.packed_move_id && !l.return_move_id);
  if (!packedLines.length) return toast('Nothing packed to return');
  openSheet(`
    <h2 style="margin-top:2px">↩ Return 🎒 ${esc(openBag)}</h2>
    <div class="meta" style="margin:6px 0 4px">How many of each came back? Returned items go back on the shelf; the rest counts as used up.</div>
    <div style="margin:8px 0"><button class="sm-btn" id="rtAll">Everything came back</button></div>
    <div class="rows" id="rtRows"></div>
    <div class="panel-acts" style="margin-top:14px">
      <button class="btn" id="rtCancel">Cancel</button>
      <button class="btn primary" id="rtGo">Finish return</button>
    </div>
  `);
  const steps = {};
  $('rtRows').innerHTML = packedLines.map((l) => {
    const it = items.find((x) => x.id === l.item_id);
    const img = it ? imgUrl(it.primary_image_key) : null;
    return `<div class="row">
      <div class="rthumb">${img ? `<img loading="lazy" src="${img}" alt="" onerror="this.parentNode.textContent='🩹'">` : '🩹'}</div>
      <div class="rmain">
        <div class="rname">${esc(it ? it.name : 'item')}</div>
        <div class="rsub">packed ${l.qty_needed}</div>
      </div>
      <div class="racts"><span data-step="${esc(l.item_id)}"></span></div>
    </div>`;
  }).join('');
  packedLines.forEach((l) => {
    steps[l.item_id] = miniStep($('rtRows').querySelector(`[data-step="${CSS.escape(l.item_id)}"]`),
      { value: l.qty_needed, min: 0, max: l.qty_needed });
  });
  $('rtAll').onclick = () => packedLines.forEach((l) => steps[l.item_id].set(l.qty_needed));
  $('rtCancel').onclick = closeSheet;
  $('rtGo').onclick = async () => {
    $('rtGo').disabled = true;
    try {
      const r = await api(`/bags/${encodeURIComponent(openBag)}/return`, { method: 'POST', body: {
        user_name: getUser(),
        returns: packedLines.map((l) => ({ item_id: l.item_id, qty_returned: steps[l.item_id].get() })),
      }});
      toast(`Bag returned — ${r.returned} back on the shelf, ${r.consumed} used up`);
      closeSheet(); await reloadItems();
    } catch (e) { toast('Error: ' + e.message); $('rtGo').disabled = false; }
  };
}

// item picker sheet for assigning supplies to the open bag
function openPicker() {
  const inBag = new Set((bagsByVideo()[openBag] || []).map((l) => l.item_id));
  openSheet(`
    <h2 style="margin-top:2px">Add supplies to 🎒 ${esc(openBag)}</h2>
    <input class="search" id="pkSearch" type="search" placeholder="Search inventory…" style="margin-top:10px">
    <div style="margin:2px 0 8px"><button class="sm-btn" id="pkNew">➕ Item isn't in inventory yet — create it</button></div>
    <div class="rows" id="pkRows"></div>
  `);
  const render = () => {
    const q = $('pkSearch').value.trim().toLowerCase();
    const list = items.filter((it) => !q || [it.name, it.category, it.notes, it.simulated_label]
      .some((f) => f && f.toLowerCase().includes(q))).slice(0, 40);
    $('pkRows').innerHTML = list.map((it) => {
      const img = imgUrl(it.primary_image_key);
      const added = inBag.has(it.id);
      return `<div class="row">
        <div class="rthumb">${img ? `<img loading="lazy" src="${img}" alt="" onerror="this.parentNode.textContent='🩹'">` : '🩹'}</div>
        <div class="rmain">
          <div class="rname">${esc(it.name)}</div>
          <div class="rsub">${it.uncounted ? 'uncounted' : `${it.remaining} at office`}${it.category ? ' · ' + esc(it.category) : ''}</div>
        </div>
        <div class="racts">${added
          ? '<span class="badge order">In bag ✓</span>'
          : `<span data-pkstep="${esc(it.id)}"></span><button class="sm-btn primary" data-add="${esc(it.id)}">Add</button>`}</div>
      </div>`;
    }).join('') || '<div class="empty">No matches — create it as a new item.</div>';
    const pkSteps = {};
    $('pkRows').querySelectorAll('[data-pkstep]').forEach((el) => {
      pkSteps[el.dataset.pkstep] = miniStep(el, { value: 1, min: 1 });
    });
    $('pkRows').querySelectorAll('[data-add]').forEach((b) => b.onclick = async () => {
      const it = items.find((x) => x.id === b.dataset.add);
      const qty = pkSteps[b.dataset.add].get();
      b.disabled = true;
      try {
        await api('/bag-items', { method: 'POST', body: { video_name: openBag, item_id: b.dataset.add, qty_needed: qty } });
        inBag.add(b.dataset.add);
        toast(!it.uncounted && qty > it.remaining
          ? `Added — only ${Math.max(0, it.remaining)} at office, send the shortfall to the shopping list from the bag`
          : 'Added to bag');
        bagLines = await api('/bag-items');
        render();
      } catch (e) { toast('Error: ' + e.message); b.disabled = false; }
    });
  };
  let t;
  $('pkSearch').oninput = () => { clearTimeout(t); t = setTimeout(render, 150); };
  $('pkNew').onclick = () => { pickerForBag = true; $('addItemBtn').click(); };
  render();
}

// ── tabs & search ──
$('tabs').querySelectorAll('button').forEach((b) => b.onclick = () => {
  $('tabs').querySelectorAll('button').forEach((x) => x.classList.toggle('on', x === b));
  ['inv', 'shop', 'bags', 'log'].forEach((t) => $('tab-' + t).style.display = b.dataset.tab === t ? '' : 'none');
  if (b.dataset.tab === 'log') renderLog();
  if (b.dataset.tab === 'bags') renderBags();
});
let searchTimer;
$('search').oninput = () => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => { searchTerm = $('search').value; renderInventory(); }, 150);
};

// ── boot ──
seedUserFromEmail();
loadAll().catch((e) => { $('grid').innerHTML = ''; $('invEmpty').style.display = ''; $('invEmpty').textContent = 'Failed to load: ' + e.message; });
</script>
</body>
</html>
