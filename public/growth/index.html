<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NITM List Growth</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0f1a; color: #f1f5f9; font-family: 'DM Sans', system-ui, -apple-system, sans-serif; min-height: 100vh; }
    .top-nav { background: linear-gradient(180deg,#1a2332 0%,#141c28 100%); padding: 12px 24px; display: flex; align-items: center; gap: 24px; border-bottom: 1px solid #1e293b; }
    .top-nav .brand { color: #f1f5f9; font-weight: 700; font-size: 14px; text-decoration: none; letter-spacing: 0.5px; }
    .top-nav a { color: #64748b; text-decoration: none; font-size: 13px; font-weight: 500; transition: color 0.15s; }
    .top-nav a:hover, .top-nav a.active { color: #f1f5f9; }
    .wrap { max-width: 1400px; margin: 0 auto; padding: 32px 24px 80px; }
    h1 { font-size: 28px; font-weight: 700; letter-spacing: -0.3px; margin-bottom: 8px; }
    .subtitle { color: #64748b; font-size: 14px; margin-bottom: 28px; }
    .panel { background: #111827; border: 1px solid #1f2937; border-radius: 12px; padding: 24px; margin-bottom: 20px; }
    .panel h2 { font-size: 16px; font-weight: 600; margin-bottom: 16px; color: #e2e8f0; }
    .row { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
    button { background: #334155; color: #f1f5f9; border: none; padding: 10px 18px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; transition: background 0.15s; font-family: inherit; }
    button:hover:not(:disabled) { background: #475569; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    button.primary { background: #2563eb; }
    button.primary:hover:not(:disabled) { background: #1d4ed8; }
    button.small { padding: 6px 12px; font-size: 12px; }
    select, input { background: #1e293b; color: #f1f5f9; border: 1px solid #334155; padding: 8px 12px; border-radius: 6px; font-size: 13px; font-family: inherit; }
    input[type="text"] { width: 100%; max-width: 280px; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { text-align: left; padding: 10px 12px; background: #1e293b; color: #94a3b8; font-weight: 600; font-size: 11px; letter-spacing: 0.5px; text-transform: uppercase; border-bottom: 1px solid #334155; position: sticky; top: 0; cursor: pointer; user-select: none; }
    th:hover { color: #cbd5e1; }
    td { padding: 10px 12px; border-bottom: 1px solid #1e293b; color: #cbd5e1; vertical-align: middle; }
    tr:hover td { background: #161e2e; }
    .num { text-align: right; font-variant-numeric: tabular-nums; }
    .pct { color: #94a3b8; font-size: 12px; }
    .pct.positive { color: #34d399; }
    .pct.negative { color: #f87171; }
    .status-line { font-size: 12px; color: #64748b; margin-top: 8px; }
    .tabs { display: flex; gap: 4px; margin-bottom: 20px; border-bottom: 1px solid #1f2937; }
    .tab { padding: 10px 16px; cursor: pointer; color: #64748b; font-size: 13px; font-weight: 500; border-bottom: 2px solid transparent; transition: all 0.15s; }
    .tab.active { color: #f1f5f9; border-bottom-color: #2563eb; }
    .tab:hover { color: #cbd5e1; }
    .empty { text-align: center; padding: 60px 20px; color: #64748b; }
    .error { background: #2d1414; border: 1px solid #7f1d1d; color: #fca5a5; padding: 12px 16px; border-radius: 8px; font-size: 13px; margin-bottom: 16px; font-family: monospace; word-break: break-word; }
    .warning { background: #2d2414; border: 1px solid #7f5a1d; color: #fcd34d; padding: 12px 16px; border-radius: 8px; font-size: 13px; margin-bottom: 16px; }
    .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; }
    .stat { background: #1e293b; padding: 16px; border-radius: 8px; }
    .stat-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: #64748b; margin-bottom: 6px; }
    .stat-value { font-size: 22px; font-weight: 700; color: #f1f5f9; font-variant-numeric: tabular-nums; }
    .badge { display: inline-block; background: #1e293b; color: #94a3b8; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 500; }
    .badge.lead_magnet { background: #14342d; color: #6ee7b7; }
    .badge.purchaser { background: #1e2a3d; color: #93c5fd; }
    .badge.system { background: #2a2a3d; color: #c4b5fd; }
    .badge.other { background: #1e293b; color: #94a3b8; }
    /* Pill filter bar above the leaderboard */
    .pill-bar { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
    .pill { background: #1e293b; color: #94a3b8; border: 1px solid #334155; padding: 6px 12px; border-radius: 999px; font-size: 12px; font-weight: 500; cursor: pointer; transition: all 0.15s; font-family: inherit; display: inline-flex; align-items: center; gap: 6px; }
    .pill:hover { background: #283447; color: #cbd5e1; }
    .pill.active { background: #2563eb; color: #f1f5f9; border-color: #3b82f6; }
    .pill .pill-count { background: rgba(0,0,0,0.25); color: inherit; padding: 1px 6px; border-radius: 8px; font-size: 11px; font-variant-numeric: tabular-nums; }
    .pill.active .pill-count { background: rgba(255,255,255,0.18); }
    /* Manage categories panel */
    .cat-manage { background: #161e2e; border: 1px solid #1f2937; border-radius: 8px; padding: 14px; margin-bottom: 16px; }
    .cat-manage h3 { font-size: 13px; font-weight: 600; color: #cbd5e1; margin-bottom: 10px; }
    .cat-chip { display: inline-flex; align-items: center; gap: 6px; background: #1e293b; border: 1px solid #334155; color: #cbd5e1; padding: 4px 8px 4px 10px; border-radius: 6px; font-size: 12px; margin: 0 6px 6px 0; }
    .cat-chip .cat-count { color: #64748b; font-size: 11px; }
    .cat-chip .cat-del { background: transparent; color: #f87171; border: none; padding: 0 4px; cursor: pointer; font-size: 14px; line-height: 1; }
    .cat-chip .cat-del:hover { color: #fca5a5; }
    .cat-chip .cat-del:disabled { color: #475569; cursor: not-allowed; }
    .cat-chip.default { background: #14342d; border-color: #14532d; }
    .cat-chip.default .cat-count { color: #6ee7b7; opacity: 0.7; }
    .label-input { background: #1e293b; border: 1px solid #334155; color: #f1f5f9; padding: 4px 8px; border-radius: 4px; font-size: 12px; font-family: inherit; width: 100%; max-width: 240px; }
    .category-select { background: #1e293b; border: 1px solid #334155; color: #f1f5f9; padding: 4px 8px; border-radius: 4px; font-size: 12px; font-family: inherit; }
    .help { font-size: 12px; color: #64748b; line-height: 1.5; margin-top: 12px; }
    .help code { background: #1e293b; padding: 1px 6px; border-radius: 3px; font-size: 11px; }
    .loading { color: #64748b; padding: 20px; text-align: center; font-size: 13px; }
    .movers-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .mover-card { background: #1a1f2e; border: 1px solid #1f2937; border-radius: 8px; padding: 14px; }
    .mover-card h3 { font-size: 13px; font-weight: 600; margin-bottom: 12px; color: #cbd5e1; }
    .mover-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #1f2937; font-size: 12px; }
    .mover-row:last-child { border-bottom: none; }
    .mover-name { color: #cbd5e1; max-width: 220px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .chart-container { width: 100%; height: 320px; position: relative; }
    .sparkline { display: inline-block; vertical-align: middle; }
    .caveat-toggle { color: #64748b; font-size: 12px; cursor: pointer; text-decoration: underline; }
    .caveat-toggle:hover { color: #94a3b8; }
    @media(max-width:900px){ .movers-grid{grid-template-columns:1fr} }
    @media(max-width:700px){ .wrap{padding:20px 12px 60px} .panel{padding:16px} h1{font-size:22px} }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/@babel/standalone@7.24.0/babel.min.js"></script>
</head>
<body>
  <nav class="top-nav">
    <span class="brand">NITM Ops</span>
    <a href="/">Hub</a>
    <a href="/calendar/">Calendar</a>
    <a href="/inventory/">Inventory</a>
    <a href="/3pl/">3PL</a>
    <a href="/tracker/">Tracker</a>
    <a href="/ambassadors/">Ambassadors</a>
    <a href="/cx-agent/">CX Agent</a>
    <a href="/icp/">ICP</a>
    <a href="/growth/" class="active">Growth</a>
  </nav>
  <div id="root"></div>
  <div id="boot-error" style="display:none;padding:24px;color:#fca5a5;font-family:monospace;font-size:12px;white-space:pre-wrap;"></div>

<script>
// Surface any boot-time errors so we don't get a blank page silently.
window.addEventListener("error", function(e) {
  var el = document.getElementById("boot-error");
  if (el) { el.style.display = "block"; el.textContent = "Boot error: " + (e.error?.stack || e.message); }
});
</script>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useMemo, useCallback, useRef } = React;

const fmtNum = (n) => n == null ? "—" : Number(n).toLocaleString();
const fmtPct = (n) => n == null ? "—" : (Number(n) * 100).toFixed(1) + "%";
const fmtDelta = (n) => n == null ? "—" : (n > 0 ? "+" : "") + Number(n).toLocaleString();
const fmtDate = (s) => { if (!s) return "never"; try { return new Date(s).toLocaleString(); } catch { return s; } };

// Distinct line colors for the stacked area chart
const COLORS = ["#3b82f6","#10b981","#f59e0b","#ef4444","#8b5cf6","#ec4899","#06b6d4","#f97316","#84cc16","#a855f7","#14b8a6","#fbbf24"];

function useApi(path, deps = []) {
  const [data, setData] = useState(null);
  const [error, setError] = useState(null);
  const [loading, setLoading] = useState(true);

  const reload = useCallback(async () => {
    setLoading(true);
    setError(null);
    try {
      const res = await fetch(path);
      const j = await res.json();
      if (!res.ok) throw new Error(j.error || ("HTTP " + res.status));
      setData(j);
    } catch (e) {
      setError(e.message);
    } finally {
      setLoading(false);
    }
  }, [path]);

  useEffect(() => { reload(); }, deps); // eslint-disable-line
  return { data, error, loading, reload };
}

function Caveats() {
  const [open, setOpen] = useState(false);
  return (
    <div className="help">
      <span className="caveat-toggle" onClick={() => setOpen(!open)}>
        {open ? "Hide" : "About this data"}
      </span>
      {open && (
        <div style={{marginTop:8}}>
          Numbers come from Klaviyo's <code>Subscribed to List</code> metric and reflect <strong>gross new opt-ins</strong> per list — they do not subtract unsubscribes or list cleans. Klaviyo only records the event when a profile actively opts in via a form, API single-subscribe, or opt-in page; bulk imports and double-opt-in events on existing subscribers may not be counted, so absolute numbers can differ from Klaviyo's own growth reports. Relative comparisons across lists and over time remain valid.
        </div>
      )}
    </div>
  );
}

function Status({ status, onBackfill, onBackfillAll, onRecent, onRegistry, syncing }) {
  if (!status) return null;
  const last = (key) => (status.sync_state || []).find(s => s.key === key)?.updated_at;
  return (
    <div className="panel">
      <h2>Sync status</h2>
      <div className="stat-grid">
        <div className="stat"><div className="stat-label">Lists tracked</div><div className="stat-value">{fmtNum(status.lists?.c)}</div></div>
        <div className="stat"><div className="stat-label">Subs rows</div><div className="stat-value">{fmtNum(status.subs?.c)}</div></div>
        <div className="stat"><div className="stat-label">Earliest data</div><div className="stat-value" style={{fontSize:14}}>{status.subs?.earliest || "—"}</div></div>
        <div className="stat"><div className="stat-label">Latest data</div><div className="stat-value" style={{fontSize:14}}>{status.subs?.latest || "—"}</div></div>
      </div>
      <div className="row" style={{marginTop:16}}>
        <button className="primary" onClick={onBackfillAll} disabled={syncing}>{syncing ? "Syncing…" : "Backfill all-time"}</button>
        <button onClick={onBackfill} disabled={syncing}>Backfill 90 days</button>
        <button onClick={onRecent} disabled={syncing}>Sync last 7 days</button>
        <button onClick={onRegistry} disabled={syncing}>Refresh list registry</button>
      </div>
      <div className="status-line">
        Last all-time: {fmtDate(last("last_alltime_backfill"))} · Last 90-day: {fmtDate(last("last_full_backfill"))} · Last recent: {fmtDate(last("last_recent_sync"))} · Registry: {fmtDate(last("registry_last_sync"))}
      </div>
      <div className="help" style={{marginTop:8}}>
        <strong>All-time</strong> walks year by year until it hits a year with no data. Usually 3-5 Klaviyo calls, ~30-60s. Run once after first deploy; use <strong>Sync last 7 days</strong> for daily refresh after that.
      </div>
    </div>
  );
}

function Leaderboard({ days, setDays, category, setCategory, categories, refreshNonce }) {
  const qs = `days=${days}` + (category ? `&category=${encodeURIComponent(category)}` : "");
  const { data, error, loading } = useApi(`/growth/api/leaderboard?${qs}`, [days, category, refreshNonce]);
  const { data: catTotals } = useApi(`/growth/api/category-totals?days=${days}`, [days, refreshNonce]);
  const [sortKey, setSortKey] = useState("gross_subs");
  const [sortDir, setSortDir] = useState("desc");

  const sorted = useMemo(() => {
    if (!data?.rows) return [];
    const rows = [...data.rows];
    rows.sort((a, b) => {
      const av = a[sortKey] ?? -Infinity;
      const bv = b[sortKey] ?? -Infinity;
      if (typeof av === "string") return sortDir === "asc" ? av.localeCompare(bv) : bv.localeCompare(av);
      return sortDir === "asc" ? av - bv : bv - av;
    });
    return rows;
  }, [data, sortKey, sortDir]);

  const toggle = (key) => {
    if (sortKey === key) setSortDir(sortDir === "asc" ? "desc" : "asc");
    else { setSortKey(key); setSortDir("desc"); }
  };
  const arrow = (key) => sortKey === key ? (sortDir === "asc" ? " ↑" : " ↓") : "";

  // Pill bar source — show "All" plus every defined category, in sort_order.
  // Counts come from category-totals; missing categories show "0".
  const pillCats = (categories || []);
  const totalsAll = catTotals?._all?.subs || 0;
  const getCount = (name) => catTotals?.totals?.[name]?.subs || 0;

  return (
    <div className="panel">
      <div className="row" style={{justifyContent:"space-between",marginBottom:16}}>
        <h2 style={{margin:0}}>Leaderboard — gross new subs</h2>
        <select value={days} onChange={e => setDays(parseInt(e.target.value))}>
          <option value={7}>Last 7 days</option>
          <option value={14}>Last 14 days</option>
          <option value={30}>Last 30 days</option>
          <option value={60}>Last 60 days</option>
          <option value={90}>Last 90 days</option>
          <option value={180}>Last 6 months</option>
          <option value={365}>Last 12 months</option>
          <option value={3650}>All time (~10y)</option>
        </select>
      </div>
      {/* Category filter pills */}
      <div className="pill-bar">
        <button className={"pill " + (!category ? "active" : "")} onClick={() => setCategory(null)}>
          All
          <span className="pill-count">{fmtNum(totalsAll)}</span>
        </button>
        {pillCats.map(c => (
          <button
            key={c.name}
            className={"pill " + (category === c.name ? "active" : "")}
            onClick={() => setCategory(category === c.name ? null : c.name)}
          >
            {c.name}
            <span className="pill-count">{fmtNum(getCount(c.name))}</span>
          </button>
        ))}
      </div>
      {error && <div className="error">{error}</div>}
      {loading && <div className="loading">Loading…</div>}
      {data && data.rows.length === 0 && <div className="empty">No subscription data yet. Run a backfill to populate.</div>}
      {data && data.rows.length > 0 && (
        <>
          <div style={{marginBottom:12,fontSize:13,color:"#94a3b8"}}>
            <strong style={{color:"#f1f5f9"}}>{fmtNum(data.total_subs)}</strong> total new subs across <strong style={{color:"#f1f5f9"}}>{data.rows.length}</strong> lists{category ? <> in <span className={"badge " + category}>{category}</span></> : null} · window {data.window_start} → {data.window_end}
          </div>
          <div style={{overflowX:"auto"}}>
            <table>
              <thead>
                <tr>
                  <th onClick={() => toggle("label")}>List / Label{arrow("label")}</th>
                  <th onClick={() => toggle("category")}>Category{arrow("category")}</th>
                  <th className="num" onClick={() => toggle("gross_subs")}>Gross subs{arrow("gross_subs")}</th>
                  <th className="num" onClick={() => toggle("daily_avg")}>Daily avg{arrow("daily_avg")}</th>
                  <th className="num" onClick={() => toggle("pct_of_total")}>% of total{arrow("pct_of_total")}</th>
                  <th className="num" onClick={() => toggle("delta")}>vs prior period{arrow("delta")}</th>
                </tr>
              </thead>
              <tbody>
                {sorted.map(r => (
                  <tr key={r.list_name}>
                    <td>
                      <div style={{fontWeight:500,color:"#f1f5f9"}}>{r.label}</div>
                      {r.label !== r.list_name && <div style={{fontSize:11,color:"#64748b"}}>{r.list_name}</div>}
                    </td>
                    <td><span className={"badge " + (r.category || 'other')}>{r.category || 'other'}</span></td>
                    <td className="num"><strong>{fmtNum(r.gross_subs)}</strong></td>
                    <td className="num">{r.daily_avg.toFixed(1)}</td>
                    <td className="num pct">{fmtPct(r.pct_of_total)}</td>
                    <td className="num">
                      <div>{fmtDelta(r.delta)}</div>
                      {r.pct_change != null && (
                        <div className={"pct " + (r.delta > 0 ? "positive" : r.delta < 0 ? "negative" : "")}>
                          {(r.pct_change >= 0 ? "+" : "") + fmtPct(r.pct_change)}
                        </div>
                      )}
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </>
      )}
    </div>
  );
}

function GrowthChart({ days }) {
  const { data, error, loading } = useApi(`/growth/api/timeseries?days=${days}&top=8`, [days]);
  const [hover, setHover] = useState(null);
  const [width, setWidth] = useState(900);
  const wrapRef = useRef(null);

  useEffect(() => {
    function onResize() {
      if (wrapRef.current) setWidth(wrapRef.current.clientWidth);
    }
    onResize();
    window.addEventListener("resize", onResize);
    return () => window.removeEventListener("resize", onResize);
  }, [data]);

  if (loading) return <div className="panel"><div className="loading">Loading chart…</div></div>;
  if (error) return <div className="panel"><div className="error">{error}</div></div>;
  if (!data || data.rows.length === 0) {
    return <div className="panel"><h2>Growth over time</h2><div className="empty">No data to chart yet.</div></div>;
  }

  // Build stacked series
  const keys = data.series_keys; // [{key, label}]
  const rows = data.rows;        // [{date, key1: n, key2: n}]
  const n = rows.length;

  // Compute cumulative stack values for each row
  const stacked = rows.map(r => {
    let acc = 0;
    const out = { date: r.date, layers: [] };
    for (const k of keys) {
      const v = r[k.key] || 0;
      out.layers.push({ key: k.key, label: k.label, base: acc, top: acc + v, value: v });
      acc += v;
    }
    out.total = acc;
    return out;
  });

  const yMax = Math.max(1, ...stacked.map(s => s.total));
  // Round yMax up to a nice number
  const niceMax = (() => {
    if (yMax <= 10) return Math.ceil(yMax);
    const mag = Math.pow(10, Math.floor(Math.log10(yMax)));
    return Math.ceil(yMax / mag) * mag;
  })();

  // Layout
  const W = Math.max(400, width);
  const H = 320;
  const P = { top: 16, right: 16, bottom: 40, left: 48 };
  const innerW = W - P.left - P.right;
  const innerH = H - P.top - P.bottom;
  const stepX = n > 1 ? innerW / (n - 1) : 0;

  const xOf = (i) => P.left + i * stepX;
  const yOf = (v) => P.top + innerH - (v / niceMax) * innerH;

  // Build polygon paths for each layer (bottom-to-top stack)
  function layerPath(layerIdx) {
    const top = stacked.map((s, i) => `${xOf(i)},${yOf(s.layers[layerIdx].top)}`).join(" ");
    const bot = [...stacked].reverse().map((s, ri) => {
      const i = n - 1 - ri;
      return `${xOf(i)},${yOf(s.layers[layerIdx].base)}`;
    }).join(" ");
    return `${top} ${bot}`;
  }

  // Y axis ticks
  const ticks = [];
  const tickCount = 4;
  for (let t = 0; t <= tickCount; t++) {
    const v = (niceMax / tickCount) * t;
    ticks.push({ v, y: yOf(v) });
  }

  // X axis labels (show ~6)
  const xLabelStep = Math.max(1, Math.ceil(n / 6));

  // Hover handler maps x to nearest row
  function onMove(e) {
    const rect = e.currentTarget.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const i = Math.max(0, Math.min(n - 1, Math.round((x - P.left) / Math.max(1, stepX))));
    setHover({ i, x: xOf(i), row: stacked[i] });
  }

  return (
    <div className="panel">
      <h2>Top {keys.length} lists — daily new subs (stacked)</h2>
      <div ref={wrapRef} style={{position:"relative",width:"100%"}}>
        <svg width={W} height={H} style={{display:"block"}} onMouseMove={onMove} onMouseLeave={() => setHover(null)}>
          {/* Grid + Y ticks */}
          {ticks.map((t, i) => (
            <g key={i}>
              <line x1={P.left} x2={W - P.right} y1={t.y} y2={t.y} stroke="#1f2937" strokeDasharray="3 3" />
              <text x={P.left - 8} y={t.y + 4} textAnchor="end" fill="#64748b" fontSize="11">{Math.round(t.v).toLocaleString()}</text>
            </g>
          ))}
          {/* Stacked layers */}
          {keys.map((k, li) => (
            <polygon
              key={k.key}
              points={layerPath(li)}
              fill={COLORS[li % COLORS.length]}
              fillOpacity={0.75}
              stroke={COLORS[li % COLORS.length]}
              strokeWidth="1"
            />
          ))}
          {/* X labels */}
          {stacked.map((s, i) => (
            i % xLabelStep === 0 ? (
              <text key={i} x={xOf(i)} y={H - P.bottom + 16} textAnchor="middle" fill="#64748b" fontSize="11">
                {s.date.slice(5)}
              </text>
            ) : null
          ))}
          {/* Hover indicator */}
          {hover && (
            <line x1={hover.x} x2={hover.x} y1={P.top} y2={P.top + innerH} stroke="#475569" strokeDasharray="2 2" />
          )}
        </svg>
        {hover && (
          <div style={{
            position:"absolute",
            left: Math.min(hover.x + 12, W - 260),
            top: 16,
            background:"#1e293b",
            border:"1px solid #334155",
            borderRadius:"6px",
            padding:"10px 12px",
            fontSize:"12px",
            color:"#cbd5e1",
            pointerEvents:"none",
            minWidth:"220px",
            zIndex:10,
          }}>
            <div style={{color:"#f1f5f9",fontWeight:600,marginBottom:6}}>{hover.row.date}</div>
            <div style={{color:"#94a3b8",marginBottom:6,fontSize:11}}>Total: {fmtNum(hover.row.total)}</div>
            {hover.row.layers.slice().reverse().filter(l => l.value > 0).map(l => {
              const li = keys.findIndex(k => k.key === l.key);
              return (
                <div key={l.key} style={{display:"flex",justifyContent:"space-between",gap:12,padding:"2px 0"}}>
                  <span style={{display:"flex",alignItems:"center",gap:6,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",maxWidth:160}}>
                    <span style={{width:10,height:10,background:COLORS[li % COLORS.length],borderRadius:2,flexShrink:0}}></span>
                    <span style={{overflow:"hidden",textOverflow:"ellipsis"}} title={l.label}>{l.label}</span>
                  </span>
                  <span style={{fontVariantNumeric:"tabular-nums"}}>{fmtNum(l.value)}</span>
                </div>
              );
            })}
          </div>
        )}
      </div>
      {/* Legend */}
      <div style={{display:"flex",flexWrap:"wrap",gap:12,marginTop:12,fontSize:11,color:"#94a3b8"}}>
        {keys.map((k, i) => (
          <div key={k.key} style={{display:"flex",alignItems:"center",gap:6,maxWidth:240}}>
            <span style={{width:10,height:10,background:COLORS[i % COLORS.length],borderRadius:2,flexShrink:0}}></span>
            <span style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}} title={k.label}>{k.label}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

function Movers() {
  const { data, error, loading } = useApi(`/growth/api/movers?days=14`, []);
  if (loading) return <div className="panel"><div className="loading">Loading movers…</div></div>;
  if (error) return <div className="panel"><div className="error">{error}</div></div>;
  if (!data) return null;
  return (
    <div className="panel">
      <h2>Movers — last 14 days vs prior 14 days</h2>
      <div className="movers-grid">
        <div className="mover-card">
          <h3>Accelerating</h3>
          {data.accelerators.length === 0 && <div style={{color:"#64748b",fontSize:12}}>No accelerators with enough volume to show.</div>}
          {data.accelerators.map(m => (
            <div className="mover-row" key={m.list_name}>
              <span className="mover-name" title={m.list_name}>{m.label}</span>
              <span>
                <span style={{color:"#cbd5e1"}}>{fmtNum(m.prev_subs)} → {fmtNum(m.curr_subs)}</span>
                <span className="pct positive" style={{marginLeft:8}}>
                  {m.pct_change != null ? `+${fmtPct(m.pct_change)}` : "new"}
                </span>
              </span>
            </div>
          ))}
        </div>
        <div className="mover-card">
          <h3>Decelerating</h3>
          {data.decelerators.length === 0 && <div style={{color:"#64748b",fontSize:12}}>No decelerators to flag.</div>}
          {data.decelerators.map(m => (
            <div className="mover-row" key={m.list_name}>
              <span className="mover-name" title={m.list_name}>{m.label}</span>
              <span>
                <span style={{color:"#cbd5e1"}}>{fmtNum(m.prev_subs)} → {fmtNum(m.curr_subs)}</span>
                <span className="pct negative" style={{marginLeft:8}}>
                  {m.pct_change != null ? fmtPct(m.pct_change) : ""}
                </span>
              </span>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

function CategoryManager({ categories, onChanged }) {
  const [newName, setNewName] = useState("");
  const [busy, setBusy] = useState(false);
  const [err, setErr] = useState(null);

  const add = async () => {
    setErr(null);
    setBusy(true);
    try {
      const res = await fetch("/growth/api/categories", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({ name: newName }),
      });
      const j = await res.json();
      if (!res.ok) throw new Error(j.error || "Failed to add");
      setNewName("");
      await onChanged();
    } catch (e) {
      setErr(e.message);
    } finally {
      setBusy(false);
    }
  };

  const remove = async (name, listCount) => {
    if (listCount > 0) {
      if (!confirm(`'${name}' has ${listCount} list(s) assigned. Deleting will demote them to 'other'. Continue?`)) return;
    } else {
      if (!confirm(`Delete category '${name}'?`)) return;
    }
    setBusy(true);
    setErr(null);
    try {
      const res = await fetch(`/growth/api/categories/${encodeURIComponent(name)}`, { method: "DELETE" });
      const j = await res.json();
      if (!res.ok) throw new Error(j.error || "Failed to delete");
      await onChanged();
    } catch (e) {
      setErr(e.message);
    } finally {
      setBusy(false);
    }
  };

  return (
    <div className="cat-manage">
      <h3>Categories</h3>
      <div style={{marginBottom:10}}>
        {(categories || []).map(c => (
          <span key={c.name} className={"cat-chip " + (c.is_default ? "default" : "")}>
            <span>{c.name}</span>
            <span className="cat-count">{c.list_count}</span>
            {!c.is_default && (
              <button className="cat-del" disabled={busy} onClick={() => remove(c.name, c.list_count)} title="Delete">×</button>
            )}
          </span>
        ))}
      </div>
      <div className="row">
        <input
          className="label-input"
          type="text"
          placeholder="new_category_name"
          value={newName}
          onChange={e => setNewName(e.target.value)}
          onKeyDown={e => { if (e.key === "Enter" && newName.trim()) add(); }}
          style={{maxWidth:220}}
        />
        <button className="primary small" disabled={busy || !newName.trim()} onClick={add}>Add</button>
      </div>
      {err && <div className="error" style={{marginTop:10,marginBottom:0}}>{err}</div>}
      <div style={{fontSize:11,color:"#64748b",marginTop:8}}>
        Names are lowercased and spaces become underscores. <code>other</code> is the fallback bucket and can't be deleted.
      </div>
    </div>
  );
}

function Registry({ categories, refreshCategories }) {
  const { data, error, loading, reload } = useApi(`/growth/api/lists`, []);
  const [filter, setFilter] = useState("");
  const [saving, setSaving] = useState({});

  const save = async (row, patch) => {
    setSaving(s => ({...s, [row.list_id]: true}));
    try {
      await fetch("/growth/api/lists", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
          list_id: row.list_id,
          lead_magnet_label: row.lead_magnet_label,
          category: row.category,
          is_active: row.is_active,
          ...patch,
        }),
      });
      await reload();
      // Category counts on chips and pills depend on list assignments — refresh.
      await refreshCategories();
    } finally {
      setSaving(s => ({...s, [row.list_id]: false}));
    }
  };

  const filtered = useMemo(() => {
    if (!data?.lists) return [];
    const f = filter.toLowerCase();
    if (!f) return data.lists;
    return data.lists.filter(l =>
      (l.name || "").toLowerCase().includes(f) ||
      (l.lead_magnet_label || "").toLowerCase().includes(f)
    );
  }, [data, filter]);

  if (loading) return <div className="panel"><div className="loading">Loading lists…</div></div>;
  if (error) return <div className="panel"><div className="error">{error}</div></div>;

  return (
    <div className="panel">
      <h2>List registry</h2>
      <CategoryManager categories={categories} onChanged={async () => { await refreshCategories(); await reload(); }} />
      <div className="row" style={{marginBottom:16}}>
        <input type="text" placeholder="Filter by name or label…" value={filter} onChange={e => setFilter(e.target.value)} />
        <div style={{fontSize:12,color:"#64748b"}}>{filtered.length} of {data.lists.length} lists</div>
      </div>
      <div style={{overflowX:"auto"}}>
        <table>
          <thead>
            <tr>
              <th>Klaviyo list name</th>
              <th>Friendly label</th>
              <th>Category</th>
              <th className="num">All-time subs</th>
              <th></th>
            </tr>
          </thead>
          <tbody>
            {filtered.map(l => (
              <RegistryRow key={l.list_id} list={l} categories={categories} onSave={save} saving={saving[l.list_id]} />
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

function RegistryRow({ list, categories, onSave, saving }) {
  const [label, setLabel] = useState(list.lead_magnet_label || "");
  const [category, setCategory] = useState(list.category || "other");
  const dirty = label !== (list.lead_magnet_label || "") || category !== (list.category || "other");
  // If the row's stored category was deleted, it won't appear in categories list.
  // Add it as a transient option so the dropdown can still show it instead of
  // silently snapping to something else.
  const opts = (categories || []).map(c => c.name);
  if (category && !opts.includes(category)) opts.push(category);

  return (
    <tr>
      <td><div style={{fontSize:12,color:"#cbd5e1"}}>{list.name}</div></td>
      <td>
        <input className="label-input" type="text" placeholder="(optional)" value={label} onChange={e => setLabel(e.target.value)} />
      </td>
      <td>
        <select className="category-select" value={category} onChange={e => setCategory(e.target.value)}>
          {opts.map(o => <option key={o} value={o}>{o}</option>)}
        </select>
      </td>
      <td className="num">{fmtNum(list.all_time_subs)}</td>
      <td>
        {dirty && (
          <button className="primary small" disabled={saving} onClick={() => onSave({...list, lead_magnet_label: label, category}, { lead_magnet_label: label, category })}>
            {saving ? "…" : "Save"}
          </button>
        )}
      </td>
    </tr>
  );
}

function App() {
  const [days, setDays] = useState(30);
  const [tab, setTab] = useState("dashboard");
  const [syncing, setSyncing] = useState(false);
  const [syncMsg, setSyncMsg] = useState(null);
  const [category, setCategory] = useState(null);
  const [refreshNonce, setRefreshNonce] = useState(0);
  const { data: status, reload: reloadStatus } = useApi("/growth/api/status", []);
  const { data: catData, reload: reloadCats } = useApi("/growth/api/categories", []);
  const categories = catData?.categories || [];

  const refreshCategories = useCallback(async () => {
    await reloadCats();
    // Bump nonce so Leaderboard (and its category-totals dep) refetches counts.
    setRefreshNonce(n => n + 1);
  }, [reloadCats]);

  const runSync = async (endpoint, label) => {
    setSyncing(true);
    setSyncMsg(null);
    try {
      const res = await fetch(endpoint, { method: "POST" });
      const j = await res.json();
      if (!res.ok) throw new Error(j.error || ("HTTP " + res.status));
      setSyncMsg({ ok: true, text: `${label} done — ${JSON.stringify(j)}` });
      await reloadStatus();
      setRefreshNonce(n => n + 1);
    } catch (e) {
      setSyncMsg({ ok: false, text: `${label} failed: ${e.message}` });
    } finally {
      setSyncing(false);
    }
  };

  return (
    <div className="wrap">
      <h1>List Growth</h1>
      <div className="subtitle">Which Klaviyo lists are pulling, by gross new subscribers.</div>

      {syncMsg && (
        <div className={syncMsg.ok ? "warning" : "error"} style={syncMsg.ok ? {borderColor:"#14532d",background:"#14342d",color:"#86efac"} : null}>
          {syncMsg.text}
        </div>
      )}

      <Status
        status={status}
        syncing={syncing}
        onBackfill={() => runSync("/growth/api/sync/backfill?days=90", "Backfill 90d")}
        onBackfillAll={() => runSync("/growth/api/sync/backfill-all", "All-time backfill")}
        onRecent={() => runSync("/growth/api/sync/recent", "Recent sync")}
        onRegistry={() => runSync("/growth/api/sync/registry", "Registry refresh")}
      />

      <div className="tabs">
        <div className={"tab " + (tab === "dashboard" ? "active" : "")} onClick={() => setTab("dashboard")}>Dashboard</div>
        <div className={"tab " + (tab === "registry" ? "active" : "")} onClick={() => setTab("registry")}>List registry</div>
      </div>

      {tab === "dashboard" && (
        <>
          <Leaderboard
            days={days} setDays={setDays}
            category={category} setCategory={setCategory}
            categories={categories}
            refreshNonce={refreshNonce}
          />
          <GrowthChart days={days} />
          <Movers />
        </>
      )}
      {tab === "registry" && <Registry categories={categories} refreshCategories={refreshCategories} />}

      <Caveats />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
